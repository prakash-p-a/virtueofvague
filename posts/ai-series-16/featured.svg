<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="var(--hero-bg-1)"/>

  <!-- Concentric rings — investigation / depth -->
  <circle cx="800" cy="450" r="380" fill="none" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.2"/>
  <circle cx="800" cy="450" r="290" fill="none" stroke="var(--hero-stone)" stroke-width="1" opacity="0.2"/>
  <circle cx="800" cy="450" r="200" fill="none" stroke="var(--hero-stone)" stroke-width="1" opacity="0.25"/>
  <circle cx="800" cy="450" r="120" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="800" cy="450" r="55" fill="none" stroke="var(--hero-gold)" stroke-width="2" opacity="0.45"/>
  <circle cx="800" cy="450" r="8" fill="var(--hero-gold)" opacity="0.7"/>

  <!-- Subtle cross-hairs -->
  <line x1="800" y1="60" x2="800" y2="840" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.1"/>
  <line x1="420" y1="450" x2="1180" y2="450" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.1"/>

  <!-- Series number -->
  <text x="1530" y="75" text-anchor="end" font-family="Georgia,serif" font-size="52" fill="var(--hero-stone)" opacity="0.25">#16</text>
</svg>
