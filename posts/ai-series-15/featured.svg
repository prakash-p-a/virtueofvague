<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="var(--hero-bg-1)"/>

  <!-- Subtle background rings -->
  <circle cx="800" cy="450" r="320" fill="none" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.2"/>
  <circle cx="800" cy="450" r="200" fill="none" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.15"/>

  <!-- Spokes -->
  <line x1="800" y1="450" x2="560" y2="210" stroke="var(--hero-stone)" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>
  <line x1="800" y1="450" x2="1040" y2="210" stroke="var(--hero-stone)" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>
  <line x1="800" y1="450" x2="480" y2="450" stroke="var(--hero-stone)" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>
  <line x1="800" y1="450" x2="1120" y2="450" stroke="var(--hero-stone)" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>
  <line x1="800" y1="450" x2="560" y2="690" stroke="var(--hero-stone)" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>
  <line x1="800" y1="450" x2="1040" y2="690" stroke="var(--hero-stone)" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>

  <!-- Outer node circles -->
  <circle cx="560" cy="210" r="38" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="1040" cy="210" r="38" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="480" cy="450" r="38" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="1120" cy="450" r="38" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="560" cy="690" r="38" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="1040" cy="690" r="38" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.35"/>

  <!-- Centre: Claude -->
  <circle cx="800" cy="450" r="60" fill="none" stroke="var(--hero-gold)" stroke-width="2" opacity="0.5"/>
  <circle cx="800" cy="450" r="8" fill="var(--hero-gold)" opacity="0.6"/>

  <!-- Series number -->
  <text x="1530" y="75" text-anchor="end" font-family="Georgia,serif" font-size="52" fill="var(--hero-stone)" opacity="0.25">#15</text>
</svg>
