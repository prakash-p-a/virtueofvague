<style>
    /* --- STARS BACKGROUND CSS --- */
    #stars-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: #000;
    }

    body {
        background: transparent !important;
    }

    /* --- CUSTOM COMET CURSOR CSS --- */
    html, body, a, button {
        cursor: none !important; /* Hide real cursor */
    }

    #custom-cursor {
        position: fixed;
        width: 8px;
        height: 8px;
        background: #fff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        box-shadow: 0 0 12px 2px rgba(255, 255, 255, 0.9); /* Comet Head Glow */
    }

    /* Style for the fading tail particles */
    .comet-particle {
        position: fixed;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        filter: blur(1px);
    }

    /* Grow effect on hover */
    .cursor-hover {
        transform: scale(3);
        background: rgba(255, 255, 255, 0.3) !important;
    }
</style>

<canvas id="stars-canvas"></canvas>
<div id="custom-cursor"></div>

<script>
    /* --- SHARED VARIABLES --- */
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('custom-cursor');
    
    let stars = [];
    const numStars = 400;
    
    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;

    /* --- STARS LOGIC --- */
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createStar() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.2 + 0.3,
            speedX: Math.random() * 0.3 - 0.15,
            speedY: Math.random() * 0.2 - 0.1,
            opacity: Math.random() * 0.6 + 0.4,
            twinkleSpeed: Math.random() * 0.02 + 0.01
        };
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < numStars; i++) {
            stars.push(createStar());
        }
    }

    /* --- COMET TAIL LOGIC --- */
    function createTailParticle(x, y) {
        const particle = document.createElement('div');
        particle.className = 'comet-particle';
        
        // Randomize trail particle size slightly
        const size = Math.random() * 4 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        
        document.body.appendChild(particle);

        // Animate the "fading away"
        let opacity = 0.6;
        let scale = 1;
        
        const fadeEffect = setInterval(() => {
            opacity -= 0.05;
            scale -= 0.05;
            particle.style.opacity = opacity;
            particle.style.transform = `scale(${scale})`;
            
            if (opacity <= 0) {
                clearInterval(fadeEffect);
                particle.remove();
            }
        }, 30); // Speed of the fade
    }

    /* --- INPUT TRACKING --- */
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        // Create a particle at the current mouse position
        createTailParticle(e.clientX, e.clientY);
    });

    /* --- ANIMATION LOOP --- */
    function animate() {
        // 1. Draw Stars
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
            star.opacity += star.twinkleSpeed;
            if (star.opacity > 1 || star.opacity < 0.4) star.twinkleSpeed *= -1;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
            ctx.fill();
            star.x += star.speedX;
