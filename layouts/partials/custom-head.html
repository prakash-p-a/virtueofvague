<style>
    /* Theme variables – adapt based on <html> class 'dark' or not */
    :root {
        --bg-color: #000;
        --star-color: #fff;
        --cursor-gradient: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.8) 20%, rgba(255,255,255,0) 70%);
        --debris-color: #fff;
    }
    html:not(.dark) {
        --bg-color: #f5f5f5;
        --star-color: #000;
        --cursor-gradient: radial-gradient(circle, #000 0%, rgba(0,0,0,0.8) 20%, rgba(0,0,0,0) 70%);
        --debris-color: #000;
    }

    #stars-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        background: var(--bg-color);
    }
    body { background: transparent !important; }

    /* Custom cursor styling */
    #custom-cursor {
        position: fixed;
        width: 14px;
        height: 14px;
        background: var(--cursor-gradient);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 15px 2px rgba(255,255,255,0.5);
        transition: opacity 0.3s ease;
    }
    html:not(.dark) #custom-cursor {
        box-shadow: 0 0 15px 2px rgba(0,0,0,0.3);
    }

    .comet-debris {
        position: fixed;
        background: var(--debris-color);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        filter: blur(0.3px);
        will-change: transform, opacity;
    }

    /* Hide cursor when idle on desktop */
    @media (min-width: 768px) {
        html, body, a, button {
            cursor: none !important;
        }
        
        body.idle #custom-cursor {
            opacity: 0;
        }
    }

    /* Mobile: hide custom cursor completely */
    @media (max-width: 767px) {
        #custom-cursor {
            display: none !important;
        }
        html, body, a, button {
            cursor: auto !important;
        }
    }

    /* --- FIX FOR DUPLICATE ICONS --- */
    @media (min-width: 768px) {
        div.flex.md\:hidden.items-center.gap-x-5 {
            display: none !important;
        }
    }

    @media (max-width: 767px) {

        }

    #menu-wrapper #search-button-mobile,
    #menu-wrapper #appearance-switcher-mobile {
        display: flex;
    }

    /* Mobile menu fix */
    #menu-wrapper {
        z-index: 9999 !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
    }

    #menu-wrapper ul li a {
        pointer-events: auto !important;
        cursor: pointer !important;
        display: block !important;
        padding: 0.75rem 1rem !important;
    }

    #menu-wrapper ul li {
        width: 100%;

    }

    /* Site title font */
    h1.mb-2.text-4xl.font-extrabold.text-neutral-800 {
        font-family: 'Libre Baskerville', 'Times New Roman', serif !important;
        font-weight: 700 !important;
        letter-spacing: -0.02em !important;
    }

    /* === TAGS SECTION STYLES === */
    .taxonomy-container,
    .term-container {
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        padding: 0 1rem;
    }

    /* Desktop navigation only – spread items */
    @media (min-width: 768px) {
        .main-menu .flex.flex-1.items-center.justify-between {
            width: 100%;
        }

        .main-menu .hidden.md\:flex.items-center.gap-x-5.md\:ml-12.h-12 {

            margin-left: 0 !important;
            gap: 0 !important;

    /* Ensure mobile hamburger is visible */

    /* Tags page cards */
    section.flex.flex-wrap.max-w-prose {
        max-width: 1200px !important;

    section.flex.flex-wrap.max-w-prose > article {

    section.flex.flex-wrap.max-w-prose > article:hover {

    section.flex.flex-wrap.max-w-prose > article h2 a {
        font-size: 1.25rem;

    section.flex.flex-wrap.max-w-prose > article h2 a:hover {

    section.flex.flex-wrap.max-w-prose > article .text-neutral-400 {

        border-radius: 20px;
        padding: 0.2rem 0.8rem;

    section.flex.flex-wrap.max-w-prose > article .text-primary-500 {

    }
    .article-tags a:hover {

    }

    /* Active word highlight */
    .word.reading-active {
        font-weight: 600 !important;

        opacity: 1 !important;
        transition: all 0.1s ease;

    /* Make sure paragraph styles don't affect word spans */

        height: 3px;
        background: linear-gradient(90deg, #a89880, #e8e4dc);
        z-index: 10000;
        transition: width 0.1s ease;

<script>
// Stars animation
(function() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('custom-cursor');
    
    let stars = [];
    let lastX = 0, lastY = 0;
    let currentStarColor = '#ffffff';

    function updateStarColor() {
        const isDark = document.documentElement.classList.contains('dark');
        currentStarColor = isDark ? '#ffffff' : '#000000';
    }
    updateStarColor();

    const observer = new MutationObserver(() => {
        updateStarColor();
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 250; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.2 + 0.2,
                speedX: Math.random() * 0.2 - 0.1,
                speedY: Math.random() * 0.15 - 0.05,
                opacity: Math.random() * 0.6 + 0.4,
                twinkle: Math.random() * 0.02 + 0.01
            });
        }
    }

    function createDebris(x, y, vx, vy) {
        const p = document.createElement('div');
        p.className = 'comet-debris';
        
        const size = Math.random() * 2.5 + 0.5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        
        document.body.appendChild(p);

        let angle = Math.atan2(vy, vx) + (Math.random() - 0.5) * 0.5;
        let force = Math.sqrt(vx*vx + vy*vy) * 0.1;
        
        let driftX = (Math.cos(angle) * force) * -0.5; 
        let driftY = (Math.sin(angle) * force) * -0.5;
        
        let opacity = 0.9;
        let scale = 1.2;

        const animateDebris = () => {
            opacity -= 0.02;
            scale -= 0.02;
            
            const currentX = parseFloat(p.style.left);
            const currentY = parseFloat(p.style.top);
            
            p.style.left = (currentX + driftX) + 'px';
            p.style.top = (currentY + driftY) + 'px';
            p.style.opacity = opacity;
            p.style.transform = `scale(${scale})`;

            driftX *= 0.98;
            driftY *= 0.98;

            if (opacity > 0) {
                requestAnimationFrame(animateDebris);
            } else {
                p.remove();
            }
        };
        requestAnimationFrame(animateDebris);
    }

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        let vx = e.clientX - lastX;
        let vy = e.clientY - lastY;
        
        if (Math.abs(vx) > 1 || Math.abs(vy) > 1) {
            for(let i=0; i<2; i++) {
                createDebris(e.clientX, e.clientY, vx, vy);
            }
        }
        
        lastX = e.clientX;
        lastY = e.clientY;
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.opacity += s.twinkle;
            if (s.opacity > 1 || s.opacity < 0.4) s.twinkle *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${currentStarColor === '#ffffff' ? '255,255,255' : '0,0,0'}, ${s.opacity})`;
            ctx.fill();
            s.x += s.speedX; s.y += s.speedY;
            if (s.x < 0) s.x = canvas.width; if (s.x > canvas.width) s.x = 0;
            if (s.y < 0) s.y = canvas.height; if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(loop);
    }

    resize();
    initStars();
    loop();
    window.addEventListener('resize', () => { resize(); initStars(); });
})();
</script>

<script>
// Hide cursor when idle (desktop only)
(function() {
    let idleTimer;
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if (!isMobile) {
        function resetIdleTimer() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                document.body.classList.add('idle');
            }, 2000);
        }
        
        document.addEventListener('mousemove', resetIdleTimer);
        document.addEventListener('mousedown', resetIdleTimer);
        document.addEventListener('keypress', resetIdleTimer);
        resetIdleTimer();
    } else {
        const cursor = document.getElementById('custom-cursor');
        if (cursor) cursor.style.display = 'none';
    }
})();
</script>

<script>
// Mobile menu fix - ensure links work
document.addEventListener('DOMContentLoaded', function() {
    const menuButton = document.getElementById('menu-button');
    const menuWrapper = document.getElementById('menu-wrapper');
    const closeButton = document.getElementById('menu-close-button');
    
    if (menuButton && menuWrapper) {
        menuButton.addEventListener('click', function(e) {
            e.preventDefault();
            menuWrapper.classList.toggle('invisible');
            menuWrapper.classList.toggle('opacity-0');
        });
        
        if (closeButton) {
            closeButton.addEventListener('click', function() {
                menuWrapper.classList.add('invisible', 'opacity-0');
            });
        }
    }
    
    // Ensure all mobile menu links close the menu when clicked
    const menuLinks = document.querySelectorAll('#menu-wrapper a');
    menuLinks.forEach(link => {
        link.addEventListener('click', function() {
            if (menuWrapper) {
                menuWrapper.classList.add('invisible', 'opacity-0');
            }
        });
    });
});
</script>



<script>
(function() {
    const ATTR = 'data-word-reveal-v3';
    if (document.documentElement.getAttribute(ATTR) === 'done') return;
    document.documentElement.setAttribute(ATTR, 'done');

    function init() {
        const content = document.querySelector('.article-content');
        if (!content || content.getAttribute(ATTR) === 'done') return;
        content.setAttribute(ATTR, 'done');

        const progressBar = document.querySelector('.reading-progress');

        // Clean up any previous word spans
        content.querySelectorAll('.word').forEach(w => {
            w.replaceWith(document.createTextNode(w.textContent));
        });

        function wrapWords(node) {
            const tagsToSkip = ['H1','H2','H3','NAV','BUTTON','SVG','SCRIPT','STYLE'];
            if (node.parentNode && tagsToSkip.includes(node.parentNode.tagName)) return;
            if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
                const parent = node.parentNode;
                if (parent.closest('svg') || parent.closest('nav')) return;
                const parts = node.textContent.split(/(\s+)/);
                const wrapper = document.createElement('span');
                parts.forEach(part => {
                    if (part.trim() === '') {
                        wrapper.appendChild(document.createTextNode(part));
                    } else {
                        const span = document.createElement('span');
                        span.className = 'word';
                        span.style.opacity = '0.15';
                        span.style.transition = 'opacity 0.4s ease, font-weight 0.2s ease';
                        span.textContent = part;
                        wrapper.appendChild(span);
                    }
                });
                parent.replaceChild(wrapper, node);
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                if (tagsToSkip.includes(node.tagName)) return;
                Array.from(node.childNodes).forEach(wrapWords);
            }
        }

        Array.from(content.childNodes).forEach(wrapWords);

        const words = Array.from(content.querySelectorAll('.word'));
        if (!words.length) return;

        function update() {
            const scrollTop = window.scrollY;
            const viewportHeight = window.innerHeight;

            // Read line = 60% down the viewport
            const readLine = scrollTop + viewportHeight * 0.6;
            // Reveal zone = between 40% and 60% of viewport  
            const revealTop = scrollTop + viewportHeight * 0.4;

            let closestWord = null;
            let minDist = Infinity;
            const focusLine = scrollTop + viewportHeight * 0.5;

            words.forEach(word => {
                const rect = word.getBoundingClientRect();
                const absCenter = rect.top + scrollTop + rect.height / 2;

                if (absCenter < readLine) {
                    // Above read line — fully visible instantly
                    word.style.transition = 'none';
                    word.style.opacity = '1';
                    word.style.fontWeight = '';
                    word.style.textShadow = '';
                } else if (absCenter < readLine + viewportHeight * 0.3) {
                    // In reveal zone — fade in smoothly
                    word.style.transition = 'opacity 0.3s ease';
                    const pos = (absCenter - readLine) / (viewportHeight * 0.3);
                    word.style.opacity = Math.max(0.12, 1 - pos).toFixed(2);
                    word.style.fontWeight = '';
                    word.style.textShadow = '';
                } else {
                    // Far below — fully faded
                    word.style.transition = 'none';
                    word.style.opacity = '0.12';
                    word.style.fontWeight = '';
                    word.style.textShadow = '';
                }

                const dist = Math.abs(absCenter - focusLine);
                if (dist < minDist) { minDist = dist; closestWord = word; }
            });

            // Highlight the single word closest to center
            if (closestWord) {
                closestWord.style.opacity = '1';
                closestWord.style.fontWeight = '700';
                closestWord.style.textShadow = '0 0 8px rgba(255,255,255,0.6)';
            }

            if (progressBar) {
                const docHeight = document.documentElement.scrollHeight - viewportHeight;
                progressBar.style.width = ((scrollTop / docHeight) * 100) + '%';
            }
        }

        // Initial state — fade everything below fold
        update();

        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => { update(); ticking = false; });
                ticking = true;
            }
        });
        window.addEventListener('resize', update);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
