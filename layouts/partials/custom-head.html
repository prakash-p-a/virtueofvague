<!-- Load Libre Baskerville font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* Theme variables – adapt based on <html> class 'dark' or not */
    :root {
        --bg-color: #000;
        --star-color: #fff;
        --cursor-gradient: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.8) 20%, rgba(255,255,255,0) 70%);
        --debris-color: #fff;
    }
    html:not(.dark) {
        --bg-color: #f5f5f5;
        --star-color: #000;
        --cursor-gradient: radial-gradient(circle, #000 0%, rgba(0,0,0,0.8) 20%, rgba(0,0,0,0) 70%);
        --debris-color: #000;
    }

    #stars-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        background: var(--bg-color); /* changes with theme */
    }
    body { background: transparent !important; }

    /* --- THE SHINY HEAD --- */
    html, body, a, button { cursor: none !important; }

    #custom-cursor {
        position: fixed;
        width: 14px;
        height: 14px;
        background: var(--cursor-gradient); /* changes with theme */
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 15px 2px rgba(255,255,255,0.5);
    }
    /* adjust shadow for light mode – optional */
    html:not(.dark) #custom-cursor {
        box-shadow: 0 0 15px 2px rgba(0,0,0,0.3);
    }

    .comet-debris {
        position: fixed;
        background: var(--debris-color); /* changes with theme */
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        filter: blur(0.3px);
        will-change: transform, opacity;
    }

    /* Site title font */
    /* Force font on site title – ultra-specific selectors for Blowfish */
    /* Force site title font - based on inspected element */
    h1.mb-2.text-4xl.font-extrabold.text-neutral-800 {
        font-family: 'Libre Baskerville', 'Times New Roman', serif !important;
        font-weight: 700 !important;
        letter-spacing: -0.02em !important;
    }
</style>

<canvas id="stars-canvas"></canvas>
<div id="custom-cursor"></div>

<script>
(function() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('custom-cursor');
    
    let stars = [];
    let lastX = 0, lastY = 0;
    let currentStarColor = '#ffffff'; // default

    // Function to get the current theme color for stars
    function updateStarColor() {
        const isDark = document.documentElement.classList.contains('dark');
        currentStarColor = isDark ? '#ffffff' : '#000000';
    }
    // Initial call
    updateStarColor();

    // Watch for theme changes (when user toggles dark/light)
    const observer = new MutationObserver(() => {
        updateStarColor();
        // Optionally redraw a frame immediately, but loop will handle it
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 250; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.2 + 0.2,
                speedX: Math.random() * 0.2 - 0.1,
                speedY: Math.random() * 0.15 - 0.05,
                opacity: Math.random() * 0.6 + 0.4,
                twinkle: Math.random() * 0.02 + 0.01
            });
        }
    }

    function createDebris(x, y, vx, vy) {
        const p = document.createElement('div');
        p.className = 'comet-debris';
        
        const size = Math.random() * 2.5 + 0.5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        
        document.body.appendChild(p);

        let angle = Math.atan2(vy, vx) + (Math.random() - 0.5) * 0.5;
        let force = Math.sqrt(vx*vx + vy*vy) * 0.1;
        
        let driftX = (Math.cos(angle) * force) * -0.5; 
        let driftY = (Math.sin(angle) * force) * -0.5;
        
        let opacity = 0.9;
        let scale = 1.2;

        const animateDebris = () => {
            opacity -= 0.02;
            scale -= 0.02;
            
            const currentX = parseFloat(p.style.left);
            const currentY = parseFloat(p.style.top);
            
            p.style.left = (currentX + driftX) + 'px';
            p.style.top = (currentY + driftY) + 'px';
            p.style.opacity = opacity;
            p.style.transform = `scale(${scale})`;

            driftX *= 0.98;
            driftY *= 0.98;

            if (opacity > 0) {
                requestAnimationFrame(animateDebris);
            } else {
                p.remove();
            }
        };
        requestAnimationFrame(animateDebris);
    }

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        let vx = e.clientX - lastX;
        let vy = e.clientY - lastY;
        
        if (Math.abs(vx) > 1 || Math.abs(vy) > 1) {
            for(let i=0; i<2; i++) {
                createDebris(e.clientX, e.clientY, vx, vy);
            }
        }
        
        lastX = e.clientX;
        lastY = e.clientY;
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Draw stars with current theme color
        stars.forEach(s => {
            s.opacity += s.twinkle;
            if (s.opacity > 1 || s.opacity < 0.4) s.twinkle *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${currentStarColor === '#ffffff' ? '255,255,255' : '0,0,0'}, ${s.opacity})`;
            ctx.fill();
            s.x += s.speedX; s.y += s.speedY;
            if (s.x < 0) s.x = canvas.width; if (s.x > canvas.width) s.x = 0;
            if (s.y < 0) s.y = canvas.height; if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(loop);
    }

    resize();
    initStars();
    loop();
    window.addEventListener('resize', () => { resize(); initStars(); });
})();
</script>
