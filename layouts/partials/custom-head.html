<link rel="icon" type="image/png" href="/favicon.png?v=5">

<style>
    /* --- STARS BACKGROUND --- */
    #stars-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: #000;
    }
    body { background: transparent !important; }

    /* --- COMET CURSOR --- */
    html, body, a, button { cursor: none !important; }

    #custom-cursor {
        position: fixed;
        width: 8px;
        height: 8px;
        background: #fff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        box-shadow: 0 0 12px 2px rgba(255, 255, 255, 0.9);
    }

    .comet-particle {
        position: fixed;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        filter: blur(1px);
        transition: transform 0.4s ease-out, opacity 0.4s ease-out;
    }

    .cursor-hover {
        transform: scale(3);
        background: rgba(255, 255, 255, 0.3) !important;
    }
</style>

<canvas id="stars-canvas"></canvas>
<div id="custom-cursor"></div>

<script>
(function() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('custom-cursor');
    
    let stars = [];
    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function init() {
        stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.2 + 0.3,
                speedX: Math.random() * 0.3 - 0.15,
                speedY: Math.random() * 0.2 - 0.1,
                opacity: Math.random() * 0.6 + 0.4,
                twinkle: Math.random() * 0.02 + 0.01
            });
        }
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'comet-particle';
        const size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        document.body.appendChild(p);
        
        setTimeout(() => {
            p.style.opacity = '0';
            p.style.transform = 'scale(0.1)';
        }, 10);
        setTimeout(() => p.remove(), 400);
    }

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        createParticle(e.clientX, e.clientY);
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.opacity += s.twinkle;
            if (s.opacity > 1 || s.opacity < 0.4) s.twinkle *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.fill();
            s.x += s.speedX; s.y += s.speedY;
            if (s.x < 0) s.x = canvas.width; if (s.x > canvas.width) s.x = 0;
            if (s.y < 0) s.y = canvas.height; if (s.y > canvas.height) s.y = 0;
        });

        cursorX += (mouseX - cursorX) * 0.2;
        cursorY += (mouseY - cursorY) * 0.2;
        cursor.style.left = (cursorX - 4) + 'px';
        cursor.style.top = (cursorY - 4) + 'px';
        
        requestAnimationFrame(loop);
    }

    resize();
    init();
    loop();
    window.addEventListener('resize', () => { resize(); init(); });
})();
</script>
