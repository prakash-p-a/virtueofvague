<script>
// Stars animation
(function() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('custom-cursor');
    
    let stars = [];
    let lastX = 0, lastY = 0;
    let currentStarColor = '#ffffff';

    function updateStarColor() {
        const isDark = document.documentElement.classList.contains('dark');
        currentStarColor = isDark ? '#ffffff' : '#000000';
    }
    updateStarColor();

    const observer = new MutationObserver(() => {
        updateStarColor();
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 250; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.2 + 0.2,
                speedX: Math.random() * 0.2 - 0.1,
                speedY: Math.random() * 0.15 - 0.05,
                opacity: Math.random() * 0.6 + 0.4,
                twinkle: Math.random() * 0.02 + 0.01
            });
        }
    }

    function createDebris(x, y, vx, vy) {
        const p = document.createElement('div');
        p.className = 'comet-debris';
        
        const size = Math.random() * 2.5 + 0.5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        
        document.body.appendChild(p);

        let angle = Math.atan2(vy, vx) + (Math.random() - 0.5) * 0.5;
        let force = Math.sqrt(vx*vx + vy*vy) * 0.1;
        
        let driftX = (Math.cos(angle) * force) * -0.5; 
        let driftY = (Math.sin(angle) * force) * -0.5;
        
        let opacity = 0.9;
        let scale = 1.2;

        const animateDebris = () => {
            opacity -= 0.02;
            scale -= 0.02;
            
            const currentX = parseFloat(p.style.left);
            const currentY = parseFloat(p.style.top);
            
            p.style.left = (currentX + driftX) + 'px';
            p.style.top = (currentY + driftY) + 'px';
            p.style.opacity = opacity;
            p.style.transform = `scale(${scale})`;

            driftX *= 0.98;
            driftY *= 0.98;

            if (opacity > 0) {
                requestAnimationFrame(animateDebris);
            } else {
                p.remove();
            }
        };
        requestAnimationFrame(animateDebris);
    }

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        let vx = e.clientX - lastX;
        let vy = e.clientY - lastY;
        
        if (Math.abs(vx) > 1 || Math.abs(vy) > 1) {
            for(let i=0; i<2; i++) {
                createDebris(e.clientX, e.clientY, vx, vy);
            }
        }
        
        lastX = e.clientX;
        lastY = e.clientY;
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Allow the breath practice (or any page) to dilate cosmic time.
        // Default 1; lower values slow the universe.
        const dilation = (typeof window._cosmicDilation === 'number') ? window._cosmicDilation : 1;
        stars.forEach(s => {
            s.opacity += s.twinkle * dilation;
            if (s.opacity > 1 || s.opacity < 0.4) s.twinkle *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${currentStarColor === '#ffffff' ? '255,255,255' : '0,0,0'}, ${s.opacity})`;
            ctx.fill();
            s.x += s.speedX * dilation;
            s.y += s.speedY * dilation;
            if (s.x < 0) s.x = canvas.width; if (s.x > canvas.width) s.x = 0;
            if (s.y < 0) s.y = canvas.height; if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(loop);
    }

    resize();
    initStars();
    loop();
    window.addEventListener('resize', () => { resize(); initStars(); });
})();
</script>

<script>
// Hide cursor when idle (desktop only)
(function() {
    let idleTimer;
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if (!isMobile) {
        function resetIdleTimer() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                document.body.classList.add('idle');
            }, 2000);
        }
        
        document.addEventListener('mousemove', resetIdleTimer);
        document.addEventListener('mousedown', resetIdleTimer);
        document.addEventListener('keypress', resetIdleTimer);
        resetIdleTimer();
    } else {
        const cursor = document.getElementById('custom-cursor');
        if (cursor) cursor.style.display = 'none';
    }
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const menuButton = document.getElementById('menu-button');
    const menuWrapper = document.getElementById('menu-wrapper');
    const closeButton = document.getElementById('menu-close-button');

    if (menuButton && menuWrapper) {
        menuButton.addEventListener('click', function() {
            menuWrapper.classList.toggle('invisible');
            menuWrapper.classList.toggle('opacity-0');
        });

        if (closeButton) {
            closeButton.addEventListener('click', function() {
                menuWrapper.classList.add('invisible', 'opacity-0');
            });
        }
    }

    // Close menu on link click — but let navigation happen naturally
    const menuLinks = document.querySelectorAll('#menu-wrapper a');
    menuLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            const href = this.getAttribute('href');
            if (href && !href.startsWith('#')) {
                // External or page link — close menu then navigate
                if (menuWrapper) menuWrapper.classList.add('invisible', 'opacity-0');
                // Don't preventDefault — let browser navigate
            } else if (href && href.startsWith('#')) {
                // Anchor link — close menu
                if (menuWrapper) menuWrapper.classList.add('invisible', 'opacity-0');
            }
        });
    });
});
</script>



<script>
(function() {
    const ATTR = 'data-word-reveal-v3';
    if (document.documentElement.getAttribute(ATTR) === 'done') return;
    document.documentElement.setAttribute(ATTR, 'done');

    function init() {
        const content = document.querySelector('.article-content');
        if (!content || content.getAttribute(ATTR) === 'done') return;
        content.setAttribute(ATTR, 'done');

        const progressBar = document.querySelector('.reading-progress');

        // Clean up any previous word spans
        content.querySelectorAll('.word').forEach(w => {
            w.replaceWith(document.createTextNode(w.textContent));
        });

        function wrapWords(node) {
            const tagsToSkip = ['H1','H2','H3','NAV','BUTTON','SVG','SCRIPT','STYLE'];
            if (node.parentNode && tagsToSkip.includes(node.parentNode.tagName)) return;
            if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
                const parent = node.parentNode;
                if (parent.closest('svg') || parent.closest('nav')) return;
                const parts = node.textContent.split(/(\s+)/);
                const wrapper = document.createElement('span');
                parts.forEach(part => {
                    if (part.trim() === '') {
                        wrapper.appendChild(document.createTextNode(part));
                    } else {
                        const span = document.createElement('span');
                        span.className = 'word';
                        span.style.opacity = '0.15';
                        span.style.transition = 'opacity 0.4s ease, font-weight 0.2s ease';
                        span.textContent = part;
                        wrapper.appendChild(span);
                    }
                });
                parent.replaceChild(wrapper, node);
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                if (tagsToSkip.includes(node.tagName)) return;
                Array.from(node.childNodes).forEach(wrapWords);
            }
        }

        Array.from(content.childNodes).forEach(wrapWords);

        const words = Array.from(content.querySelectorAll('.word'));
        if (!words.length) return;

        function update() {
                const scrollTop = window.scrollY;
                const viewportHeight = window.innerHeight;
                const docHeight = document.documentElement.scrollHeight - viewportHeight;
                
                // Near bottom — reveal everything
                const nearBottom = docHeight - scrollTop < viewportHeight * 0.3;
                if (nearBottom) {
                    words.forEach(w => {
                        w.style.transition = 'opacity 0.4s ease';
                        w.style.opacity = '1';
                        w.style.fontWeight = '';
                        w.style.textShadow = '';
                    });
                    if (progressBar) progressBar.style.width = '100%';
                    return;
                }

            // Read line = 60% down the viewport
            const readLine = scrollTop + viewportHeight * 0.6;
            // Reveal zone = between 40% and 60% of viewport  
            const revealTop = scrollTop + viewportHeight * 0.4;

            let closestWord = null;
            let minDist = Infinity;
            const focusLine = scrollTop + viewportHeight * 0.5;

            words.forEach(word => {
                const rect = word.getBoundingClientRect();
                const absCenter = rect.top + scrollTop + rect.height / 2;

                if (absCenter < readLine) {
                    // Above read line — fully visible instantly
                    word.style.transition = 'none';
                    word.style.opacity = '1';
                    word.style.fontWeight = '';
                    word.style.textShadow = '';
                } else if (absCenter < readLine + viewportHeight * 0.12) {
                    // In reveal zone — fade in smoothly
                    word.style.transition = 'opacity 0.3s ease';
                    const pos = (absCenter - readLine) / (viewportHeight * 0.12);
                    word.style.opacity = Math.max(0.12, 1 - pos).toFixed(2);
                    word.style.fontWeight = '';
                    word.style.textShadow = '';
                } else {
                    // Far below — fully faded
                    word.style.transition = 'none';
                    word.style.opacity = '0.12';
                    word.style.fontWeight = '';
                    word.style.textShadow = '';
                }

                const dist = Math.abs(absCenter - focusLine);
                if (dist < minDist) { minDist = dist; closestWord = word; }
            });

            // Highlight the single word closest to center
            if (closestWord) {
                closestWord.style.opacity = '1';
                closestWord.style.fontWeight = '700';
                closestWord.style.textShadow = '0 0 8px rgba(255,255,255,0.6)';
            }

            if (progressBar) {
                const docHeight = document.documentElement.scrollHeight - viewportHeight;
                progressBar.style.width = ((scrollTop / docHeight) * 100) + '%';
            }
        }

        // Initial state — fade everything below fold
        update();

        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => { update(); ticking = false; });
                ticking = true;
            }
        });
        window.addEventListener('resize', update);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

<script>
// End-of-post subscribe card — injected only on blog posts, after the breathe callout.
(function() {
    const API = 'https://vov-comments.virtueofvague.workers.dev';
    const SITE_KEY = '0x4AAAAAADWv8Lo3F04tEjj2';
    let turnstileLoaded = false;
    let turnstileWidgetId = null;

    function loadTurnstile() {
        return new Promise(function(resolve) {
            if (turnstileLoaded || (window.turnstile && window.turnstile.render)) {
                turnstileLoaded = true; resolve(); return;
            }
            if (document.querySelector('script[data-turnstile-loader]')) {
                // Another widget on the page (comments) is already loading it; poll briefly.
                const start = Date.now();
                const t = setInterval(function() {
                    if (window.turnstile && window.turnstile.render) {
                        clearInterval(t); turnstileLoaded = true; resolve();
                    } else if (Date.now() - start > 8000) {
                        clearInterval(t); resolve(); // give up, let submit fail with a hint
                    }
                }, 100);
                return;
            }
            const s = document.createElement('script');
            s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
            s.async = true; s.defer = true;
            s.dataset.turnstileLoader = '1';
            s.onload = function() { turnstileLoaded = true; resolve(); };
            document.head.appendChild(s);
        });
    }

    function mountTurnstile(slot) {
        if (!window.turnstile) return;
        if (turnstileWidgetId !== null) {
            try { window.turnstile.reset(turnstileWidgetId); } catch (e) {}
            return;
        }
        turnstileWidgetId = window.turnstile.render(slot, {
            sitekey: SITE_KEY,
            size: 'flexible',
            theme: 'auto',
        });
    }

    function init() {
        if (document.body.dataset.section !== 'posts') return;
        if (document.querySelector('.post-subscribe')) return;

        // Determine post slug for the source tag.
        const m = window.location.pathname.match(/\/posts\/([^/]+)\/?$/);
        const source = m ? ('post:' + decodeURIComponent(m[1])) : 'post:unknown';

        const card = document.createElement('section');
        card.className = 'post-subscribe';
        card.setAttribute('aria-label', 'subscribe to virtue of vague');
        card.innerHTML =
            '<p class="post-subscribe-line">if you want more of this in your inbox &mdash; quiet pieces, no schedule, no spam.</p>' +
            '<form novalidate>' +
                '<input type="email" name="email" placeholder="your email" autocomplete="email" maxlength="254" required>' +
                '<button type="submit">subscribe</button>' +
                '<div class="turnstile-slot"></div>' +
                '<div class="form-status" aria-live="polite"></div>' +
            '</form>' +
            '<span class="post-subscribe-fine">single opt-in &middot; one click to unsubscribe in every send.</span>';

        // Insert after the breathe callout if present, else after .article-content.
        const breathe = document.querySelector('.post-breathe');
        const article = document.querySelector('.article-content');
        const anchor = breathe || article;
        if (!anchor) return;
        anchor.parentNode.insertBefore(card, anchor.nextSibling);

        const form = card.querySelector('form');
        const input = card.querySelector('input[type="email"]');
        const btn = card.querySelector('button');
        const slot = card.querySelector('.turnstile-slot');
        const statusEl = card.querySelector('.form-status');

        let turnstileMounted = false;

        // Lazy-load Turnstile only when user focuses the input (or any interaction).
        async function ensureTurnstile() {
            if (turnstileMounted) return;
            await loadTurnstile();
            mountTurnstile(slot);
            turnstileMounted = true;
        }
        input.addEventListener('focus', ensureTurnstile, { once: true });

        form.addEventListener('submit', async function(ev) {
            ev.preventDefault();
            statusEl.className = 'form-status';
            statusEl.textContent = '';
            const email = input.value.trim();
            if (!email || !email.includes('@')) {
                statusEl.classList.add('error');
                statusEl.textContent = 'that doesn’t look like a real email.';
                return;
            }
            await ensureTurnstile();
            let token = '';
            try { token = window.turnstile ? window.turnstile.getResponse(turnstileWidgetId) : ''; } catch (e) {}
            if (!token) {
                statusEl.classList.add('error');
                statusEl.textContent = 'verifying you’re human… try again in a moment.';
                if (window.turnstile && turnstileWidgetId !== null) window.turnstile.reset(turnstileWidgetId);
                return;
            }

            btn.disabled = true;
            statusEl.textContent = 'subscribing…';
            try {
                const r = await fetch(API + '/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, source, turnstile_token: token }),
                });
                const data = await r.json();
                if (!r.ok) {
                    const msg = ({
                        invalid_email:     'that doesn’t look like a real email.',
                        rate_limited:      'you’ve tried a few times — give it a bit.',
                        turnstile_failed:  'verification failed. refresh and try again.',
                    })[data.error] || ('couldn’t subscribe: ' + (data.error || 'unknown'));
                    statusEl.classList.add('error');
                    statusEl.textContent = msg;
                } else if (data.status === 'already_subscribed') {
                    statusEl.classList.add('ok');
                    statusEl.textContent = 'you were already on the list. nothing more to do.';
                    form.reset();
                } else {
                    statusEl.classList.add('ok');
                    statusEl.textContent = 'subscribed. thanks for trusting your inbox to me.';
                    form.reset();
                }
            } catch (e) {
                statusEl.classList.add('error');
                statusEl.textContent = 'network error. try again.';
            } finally {
                btn.disabled = false;
                if (window.turnstile && turnstileWidgetId !== null) window.turnstile.reset(turnstileWidgetId);
            }
        });
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>

<script>
// Copy-to-AI button — adds a small clipboard icon at the top-right of post header.
// Click copies a context-rich prompt + post body so the reader can paste into their AI tool.
(function() {
    function buildPayload() {
        const titleEl = document.querySelector('#single_header h1');
        const bodyEl = document.querySelector('.article-content');
        const title = (titleEl ? titleEl.textContent.trim() : document.title);
        const url = window.location.href;
        const body = bodyEl ? bodyEl.innerText.replace(/\n{3,}/g, '\n\n').trim() : '';
        return (
            "i'd like to think through this essay with you.\n\n" +
            "it's from virtueofvague — a small site of personal reflection (lowercase, contemplative voice) " +
            "and cybersecurity writing, with a stillness / breath practice woven in. " +
            "before we discuss, spend a moment with the piece below; hold its unhurried tone in your reply, " +
            "and feel free to wander the wider site at https://virtueofvague.com for context.\n\n" +
            "source: " + url + "\n\n" +
            "# " + title + "\n\n" +
            body + "\n"
        );
    }

    async function copyToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
            try { await navigator.clipboard.writeText(text); return true; } catch (e) { /* fall through */ }
        }
        // Fallback for non-secure contexts / older browsers
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        let ok = false;
        try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
        document.body.removeChild(ta);
        return ok;
    }

    function makeButton() {
        const btn = document.createElement('button');
        btn.className = 'post-ai-copy';
        btn.type = 'button';
        btn.setAttribute('aria-label', 'copy this essay to discuss with your AI');
        btn.setAttribute('data-tooltip', 'copy to discuss with your AI');
        btn.innerHTML =
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                '<rect x="9" y="9" width="11" height="12" rx="2"></rect>' +
                '<path d="M5 15V5a2 2 0 0 1 2-2h10"></path>' +
            '</svg>';
        btn.addEventListener('click', async function() {
            const payload = buildPayload();
            const ok = await copyToClipboard(payload);
            const prevTip = btn.getAttribute('data-tooltip');
            if (ok) {
                btn.setAttribute('data-state', 'copied');
                btn.setAttribute('data-tooltip', 'copied ✓ — paste in your AI tool');
                btn.innerHTML =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                        '<path d="M5 12l4 4L19 6"></path>' +
                    '</svg>';
            } else {
                btn.setAttribute('data-tooltip', 'copy failed — try again');
            }
            setTimeout(function() {
                btn.removeAttribute('data-state');
                btn.setAttribute('data-tooltip', prevTip);
                btn.innerHTML =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                        '<rect x="9" y="9" width="11" height="12" rx="2"></rect>' +
                        '<path d="M5 15V5a2 2 0 0 1 2-2h10"></path>' +
                    '</svg>';
            }, 1800);
        });
        return btn;
    }

    function init() {
        if (document.body.dataset.section !== 'posts') return;
        if (document.querySelector('.post-ai-copy')) return;
        const header = document.querySelector('#single_header');
        if (!header) return;
        const btn = makeButton();
        header.appendChild(btn);

        // Sticky transition: once the header scrolls past the viewport top,
        // detach the button to fixed top-right so it remains visible.
        if ('IntersectionObserver' in window) {
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) btn.classList.remove('is-stuck');
                    else btn.classList.add('is-stuck');
                });
            });
            observer.observe(header);
        }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>

.comment .meta .name { font-weight: 600; opacity: 0.85; }
.comment .body {
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 0.95rem;
}
.comment .reply-btn {
    margin-top: 0.4rem;
    background: none;
    border: none;
    color: inherit;
    font-family: inherit;
    font-style: italic;
    font-size: 0.78rem;
    opacity: 0.55;
    cursor: pointer;
    padding: 0;
}
.comment .reply-btn:hover { opacity: 0.9; color: #e8c777; }

.comment .children { margin-top: 0.8rem; padding-left: 1.2rem; }
.comment[data-depth="3"] .children,
.comment[data-depth="4"] .children { padding-left: 0; }
.comment .in-reply-to {
    font-size: 0.75rem;
    opacity: 0.5;
    font-style: italic;
    margin-bottom: 0.2rem;
}

@media (max-width: 480px) {
    .post-comments { padding: 0 0.5rem; }
    .comment .children { padding-left: 0.7rem; }
    .comment[data-depth="2"] .children,
    .comment[data-depth="3"] .children { padding-left: 0; }
}

<script>
// Comments widget — posts only. Lazy-loads Turnstile on first expand.
(function() {
    const API = 'https://vov-comments.virtueofvague.workers.dev';
    const SITE_KEY = '0x4AAAAAADWv8Lo3F04tEjj2';
    const MAX_DEPTH = 3; // 4 levels total (0..3)
    let turnstileLoaded = false;
    let turnstileWidgetId = null;

    function esc(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function fmtTime(unix) {
        const d = new Date(unix * 1000);
        const now = Date.now() / 1000;
        const delta = now - unix;
        if (delta < 60) return 'just now';
        if (delta < 3600) return Math.floor(delta / 60) + 'm ago';
        if (delta < 86400) return Math.floor(delta / 3600) + 'h ago';
        if (delta < 86400 * 7) return Math.floor(delta / 86400) + 'd ago';
        return d.toISOString().slice(0, 10);
    }

    function loadTurnstile() {
        return new Promise(function(resolve) {
            if (turnstileLoaded || (window.turnstile && window.turnstile.render)) {
                turnstileLoaded = true; resolve(); return;
            }
            const s = document.createElement('script');
            s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
            s.async = true; s.defer = true;
            s.onload = function() { turnstileLoaded = true; resolve(); };
            document.head.appendChild(s);
        });
    }

    function buildTree(flat) {
        const byId = {};
        flat.forEach(function(c) { c.children = []; byId[c.id] = c; });
        const roots = [];
        flat.forEach(function(c) {
            if (c.parent_id && byId[c.parent_id]) byId[c.parent_id].children.push(c);
            else roots.push(c);
        });
        return { roots, byId };
    }

    function renderComment(c, byId) {
        const visualDepth = Math.min(c.depth || 0, MAX_DEPTH);
        const parent = c.parent_id ? byId[c.parent_id] : null;
        const showInReply = parent && c.depth > MAX_DEPTH;
        const canReply = (c.depth || 0) < MAX_DEPTH;

        let html = '<div class="comment" data-id="' + c.id + '" data-depth="' + visualDepth + '">';
        if (showInReply) {
            html += '<div class="in-reply-to">↳ in reply to <strong>' + esc(parent.name) + '</strong></div>';
        }
        html += '<div class="meta"><span class="name">' + esc(c.name) + '</span>' +
                '<span class="time">' + fmtTime(c.created_at) + '</span></div>';
        html += '<div class="body">' + esc(c.body) + '</div>';
        if (canReply) {
            html += '<button type="button" class="reply-btn" data-reply-id="' + c.id + '" data-reply-name="' + esc(c.name) + '">reply</button>';
        }
        if (c.children && c.children.length) {
            html += '<div class="children">';
            c.children.forEach(function(child) { html += renderComment(child, byId); });
            html += '</div>';
        }
        html += '</div>';
        return html;
    }

    async function fetchComments(postSlug, listEl) {
        listEl.innerHTML = '<div class="empty">loading…</div>';
        try {
            const r = await fetch(API + '/api/comments?post=' + encodeURIComponent(postSlug));
            const data = await r.json();
            if (!data.comments || !data.comments.length) {
                listEl.innerHTML = '<div class="empty">no thoughts yet. be the first.</div>';
                return;
            }
            const { roots, byId } = buildTree(data.comments);
            listEl.innerHTML = roots.map(function(c) { return renderComment(c, byId); }).join('');
        } catch (e) {
            listEl.innerHTML = '<div class="empty">couldn’t load comments. refresh to try again.</div>';
        }
    }

    function mountTurnstile(slotEl) {
        if (!window.turnstile) return;
        if (turnstileWidgetId !== null) {
            try { window.turnstile.reset(turnstileWidgetId); } catch (e) {}
            return;
        }
        turnstileWidgetId = window.turnstile.render(slotEl, {
            sitekey: SITE_KEY,
            size: 'flexible',
            theme: 'auto',
        });
    }

    function init() {
        if (document.body.dataset.section !== 'posts') return;
        if (document.querySelector('.post-comments')) return;

        const article = document.querySelector('.article-content');
        if (!article) return;

        // Determine post slug from URL: /posts/<slug>/
        const m = window.location.pathname.match(/\/posts\/([^/]+)\/?$/);
        if (!m) return;
        const postSlug = decodeURIComponent(m[1]);

        const section = document.createElement('section');
        section.className = 'post-comments';
        section.dataset.open = 'false';
        section.innerHTML =
            '<button class="post-comments-toggle" type="button" aria-expanded="false">' +
                '<span class="arrow">→</span>' +
                '<span class="label">thoughts? leave one</span>' +
            '</button>' +
            '<div class="post-comments-panel">' +
                '<form class="post-comments-form" novalidate>' +
                    '<div class="reply-context" hidden></div>' +
                    '<label for="cm-name">name (or initials)</label>' +
                    '<input id="cm-name" name="name" type="text" maxlength="40" autocomplete="off" required>' +
                    '<label for="cm-body">your thought</label>' +
                    '<textarea id="cm-body" name="body" maxlength="2000" required></textarea>' +
                    '<div class="turnstile-slot"></div>' +
                    '<div class="submit-row">' +
                        '<div class="form-status" aria-live="polite"></div>' +
                        '<button type="submit">leave</button>' +
                    '</div>' +
                '</form>' +
                '<div class="post-comments-list"></div>' +
            '</div>';

        // Place after breathe callout if present, else after article-content.
        const breathe = document.querySelector('.post-breathe');
        const anchor = breathe || article;
        anchor.parentNode.insertBefore(section, anchor.nextSibling);

        const toggleBtn = section.querySelector('.post-comments-toggle');
        const panel = section.querySelector('.post-comments-panel');
        const listEl = section.querySelector('.post-comments-list');
        const form = section.querySelector('.post-comments-form');
        const slot = section.querySelector('.turnstile-slot');
        const statusEl = section.querySelector('.form-status');
        const replyCtx = section.querySelector('.reply-context');
        const submitBtn = form.querySelector('button[type="submit"]');
        let parentId = null;

        function setReplyTo(id, name) {
            parentId = id;
            if (id) {
                replyCtx.hidden = false;
                replyCtx.innerHTML = 'replying to <strong>' + esc(name) + '</strong> · <button type="button" class="cancel-reply">cancel</button>';
                form.querySelector('textarea').focus();
                replyCtx.querySelector('.cancel-reply').addEventListener('click', function() { setReplyTo(null, null); });
            } else {
                replyCtx.hidden = true;
                replyCtx.innerHTML = '';
            }
        }

        listEl.addEventListener('click', function(ev) {
            const btn = ev.target.closest('.reply-btn');
            if (!btn) return;
            setReplyTo(parseInt(btn.dataset.replyId, 10), btn.dataset.replyName);
            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        toggleBtn.addEventListener('click', async function() {
            const open = section.dataset.open === 'true';
            if (open) {
                section.dataset.open = 'false';
                toggleBtn.setAttribute('aria-expanded', 'false');
                return;
            }
            section.dataset.open = 'true';
            toggleBtn.setAttribute('aria-expanded', 'true');
            fetchComments(postSlug, listEl);
            await loadTurnstile();
            mountTurnstile(slot);
        });

        form.addEventListener('submit', async function(ev) {
            ev.preventDefault();
            statusEl.className = 'form-status';
            statusEl.textContent = '';
            const name = form.elements['name'].value.trim();
            const body = form.elements['body'].value.trim();
            if (!name || !body) {
                statusEl.classList.add('error');
                statusEl.textContent = 'name and thought are both needed.';
                return;
            }
            let token = '';
            try { token = window.turnstile ? window.turnstile.getResponse(turnstileWidgetId) : ''; } catch (e) {}
            if (!token) {
                statusEl.classList.add('error');
                statusEl.textContent = 'verifying you’re human… try again in a moment.';
                if (window.turnstile && turnstileWidgetId !== null) window.turnstile.reset(turnstileWidgetId);
                return;
            }

            submitBtn.disabled = true;
            statusEl.textContent = 'posting…';
            try {
                const r = await fetch(API + '/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        post_slug: postSlug,
                        name, body,
                        parent_id: parentId,
                        turnstile_token: token,
                    }),
                });
                const data = await r.json();
                if (!r.ok) {
                    const msg = ({
                        rate_limited: 'you’re posting fast — give it a few minutes.',
                        too_many_links: 'too many links in one comment.',
                        nesting_too_deep: 'reply to a higher comment — the thread is too deep here.',
                        turnstile_failed: 'verification failed. refresh and try again.',
                    })[data.error] || ('couldn’t post: ' + (data.error || 'unknown'));
                    statusEl.classList.add('error');
                    statusEl.textContent = msg;
                } else {
                    statusEl.classList.add('ok');
                    statusEl.textContent = 'posted. thanks for the thought.';
                    form.reset();
                    setReplyTo(null, null);
                    if (window.turnstile && turnstileWidgetId !== null) window.turnstile.reset(turnstileWidgetId);
                    fetchComments(postSlug, listEl);
                }
            } catch (e) {
                statusEl.classList.add('error');
                statusEl.textContent = 'network error. try again.';
            } finally {
                submitBtn.disabled = false;
            }
        });
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>
