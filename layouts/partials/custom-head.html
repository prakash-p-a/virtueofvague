<link rel="icon" type="image/png" href="/icon.png?v=9">

<style>
    #stars-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        background: #000;
    }
    body { background: transparent !important; }

    /* --- THE SHINY HEAD --- */
    html, body, a, button { cursor: none !important; }

    #custom-cursor {
        position: fixed;
        width: 14px;
        height: 14px;
        /* Triple layer gradient for that "piercing" shine */
        background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.8) 20%, rgba(255,255,255,0) 70%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 15px 2px rgba(255, 255, 255, 0.5);
    }

    .comet-debris {
        position: fixed;
        background: #fff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        filter: blur(0.3px);
    }
</style>

<canvas id="stars-canvas"></canvas>
<div id="custom-cursor"></div>

<script>
(function() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('custom-cursor');
    
    let stars = [];
    let lastX = 0, lastY = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.2 + 0.2,
                speedX: Math.random() * 0.2 - 0.1,
                speedY: Math.random() * 0.15 - 0.05,
                opacity: Math.random() * 0.6 + 0.4,
                twinkle: Math.random() * 0.02 + 0.01
            });
        }
    }

    /* --- PIERCING DEBRIS LOGIC --- */
    function createDebris(x, y, vx, vy) {
        const p = document.createElement('div');
        p.className = 'comet-debris';
        
        const size = Math.random() * 2.5 + 0.5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        
        document.body.appendChild(p);

        // PIERCING EFFECT: 
        // Particles start with the comet's speed (vx, vy) but quickly lose it,
        // while also expanding slightly outward from the path.
        let angle = Math.atan2(vy, vx) + (Math.random() - 0.5) * 0.5; // Shockwave angle
        let force = Math.sqrt(vx*vx + vy*vy) * 0.1;
        
        let driftX = (Math.cos(angle) * force) * -0.5; 
        let driftY = (Math.sin(angle) * force) * -0.5;
        
        let opacity = 0.9;
        let scale = 1.2;

        const animateDebris = () => {
            opacity -= 0.02; // Fast fade for "hot" particles
            scale -= 0.02;
            
            const currentX = parseFloat(p.style.left);
            const currentY = parseFloat(p.style.top);
            
            p.style.left = (currentX + driftX) + 'px';
            p.style.top = (currentY + driftY) + 'px';
            p.style.opacity = opacity;
            p.style.transform = `scale(${scale})`;

            // Drift slowly fades
            driftX *= 0.98;
            driftY *= 0.98;

            if (opacity > 0) {
                requestAnimationFrame(animateDebris);
            } else {
                p.remove();
            }
        };
        requestAnimationFrame(animateDebris);
    }

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        let vx = e.clientX - lastX;
        let vy = e.clientY - lastY;
        
        // High density debris near the head for "piercing" look
        if (Math.abs(vx) > 1 || Math.abs(vy) > 1) {
            for(let i=0; i<3; i++) { // Spawn 3 particles at once for richness
                createDebris(e.clientX, e.clientY, vx, vy);
            }
        }
        
        lastX = e.clientX;
        lastY = e.clientY;
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.opacity += s.twinkle;
            if (s.opacity > 1 || s.opacity < 0.4) s.twinkle *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.fill();
            s.x += s.speedX; s.y += s.speedY;
            if (s.x < 0) s.x = canvas.width; if (s.x > canvas.width) s.x = 0;
            if (s.y < 0) s.y = canvas.height; if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(loop);
    }

    resize();
    initStars();
    loop();
    window.addEventListener('resize', () => { resize(); initStars(); });
})();
</script>
