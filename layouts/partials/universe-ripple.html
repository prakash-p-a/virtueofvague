<div id="universe-container" style="position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000;">
  <canvas id="ripple-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block;"></canvas>
</div>

<script>
(function() {
  const canvas = document.getElementById('ripple-canvas');
  const ctx = canvas.getContext('2d');
  let width, height;

  // Galaxy parameters
  const STAR_COUNT = 1500;
  const GALAXY_RADIUS = 1200;
  let stars = [];

  // Ripple simulation
  let ripples = [];
  let mouseX = -100, mouseY = -100;
  let mouseSpeed = 0;
  let lastX = 0, lastY = 0;
  let lastTimestamp = 0;

  // Theme detection
  let isDark = document.documentElement.classList.contains('dark');

  function resize() {
    width = canvas.parentElement.clientWidth;
    height = canvas.parentElement.clientHeight;
    canvas.width = width;
    canvas.height = height;
    initGalaxy();
  }

  function initGalaxy() {
    stars = [];
    const centerX = width / 2;
    const centerY = height / 2;

    for (let i = 0; i < STAR_COUNT; i++) {
      const r = Math.pow(Math.random(), 1.5) * GALAXY_RADIUS;
      const angle = Math.random() * 2 * Math.PI;
      const x = centerX + r * Math.cos(angle);
      const y = centerY + r * Math.sin(angle) * 0.2; // flattened

      const size = Math.random() * 1.8 + 0.3;
      const brightness = Math.random() * 0.6 + 0.2;

      stars.push({
        x, y, size, brightness,
        baseX: x, baseY: y,
        rippleOffsetX: 0, rippleOffsetY: 0
      });
    }
  }

  function addRipple(x, y, strength) {
    ripples.push({
      x, y,
      strength: Math.min(strength, 1.2),
      age: 0,
      life: 1.0
    });
  }

  function updateRipples() {
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.age += 0.02;
      r.life = 1 - r.age;
      if (r.life <= 0) {
        ripples.splice(i,1);
      }
    }
  }

  function applyRipples() {
    // Reset offsets
    stars.forEach(s => {
      s.rippleOffsetX = 0;
      s.rippleOffsetY = 0;
    });

    // Accumulate effect from all ripples
    ripples.forEach(r => {
      stars.forEach(s => {
        const dx = s.x - r.x;
        const dy = s.y - r.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 120) {
          const force = r.strength * r.life * (1 - dist/120);
          const angle = Math.atan2(dy, dx);
          const pushX = Math.cos(angle) * force * 8;
          const pushY = Math.sin(angle) * force * 8;
          s.rippleOffsetX += pushX;
          s.rippleOffsetY += pushY;
        }
      });
    });
  }

  function drawGalaxy() {
    ctx.clearRect(0, 0, width, height);

    // Draw subtle core glow
    const centerX = width/2;
    const centerY = height/2;
    const grad = ctx.createRadialGradient(centerX, centerY, 20, centerX, centerY, 300);
    if (isDark) {
      grad.addColorStop(0, 'rgba(100,150,255,0.1)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
    } else {
      grad.addColorStop(0, 'rgba(100,150,200,0.08)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    // Draw stars
    stars.forEach(s => {
      const x = s.x + s.rippleOffsetX;
      const y = s.y + s.rippleOffsetY;
      if (x < -20 || x > width+20 || y < -20 || y > height+20) return;

      ctx.beginPath();
      ctx.arc(x, y, s.size, 0, 2*Math.PI);
      const color = isDark
        ? `rgba(255,255,255,${s.brightness})`
        : `rgba(0,0,0,${s.brightness})`;
      ctx.fillStyle = color;
      ctx.fill();
    });
  }

  function animate() {
    updateRipples();
    applyRipples();
    drawGalaxy();
    requestAnimationFrame(animate);
  }

  // Mouse movement: track speed and add ripples
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const newX = (e.clientX - rect.left) * scaleX;
    const newY = (e.clientY - rect.top) * scaleY;

    const now = performance.now();
    const dt = Math.min(100, now - lastTimestamp);
    if (dt > 0) {
      const dx = newX - lastX;
      const dy = newY - lastY;
      const speed = Math.hypot(dx, dy) / dt;
      if (speed > 0.1) {
        addRipple(newX, newY, speed * 0.8);
      }
    }
    lastX = newX;
    lastY = newY;
    lastTimestamp = now;
  });

  canvas.addEventListener('mouseleave', () => {
    // optional: no action
  });

  // Theme change observer
  const observer = new MutationObserver(() => {
    isDark = document.documentElement.classList.contains('dark');
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });

  window.addEventListener('resize', () => {
    resize();
  });
  resize();
  animate();
})();
</script>
