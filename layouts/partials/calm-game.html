<div id="breathing-container" style="position: relative; width: 100%; max-width: 400px; margin: 0 auto; text-align: center;">
  <canvas id="breath-canvas" width="400" height="400" style="display: block; width: 100%; height: auto; background: transparent;"></canvas>
  <div style="margin-top: 1rem; font-family: 'Libre Baskerville', serif;">
    <span id="breath-phase" style="font-size: 1.5rem;">inhale</span>
    <span id="breath-timer" style="display: block; font-size: 1rem;">4s</span>
  </div>
  <button id="reset-breath" style="background: none; border: 1px solid currentColor; border-radius: 30px; padding: 0.3rem 1.2rem; margin-top: 0.5rem; cursor: pointer;">reset</button>
</div>

<script>
(function() {
  const canvas = document.getElementById('breath-canvas');
  const ctx = canvas.getContext('2d');
  const phaseSpan = document.getElementById('breath-phase');
  const timerSpan = document.getElementById('breath-timer');
  const resetBtn = document.getElementById('reset-breath');

  const INHALE = 4;
  const EXHALE = 4;
  let startTime = null;
  let phase = 'inhale';
  let animationFrame;

  // Cursor speed tracking for brightness
  let lastX = 0, lastY = 0;
  let lastTimestamp = 0;
  let cursorSpeed = 0; // range 0..1 maybe
  let speedFactor = 0; // added brightness

  // Theme
  const isDark = document.documentElement.classList.contains('dark');
  let baseColor = isDark ? [255,255,255] : [0,0,0];

  function updateCursorSpeed(e) {
    const now = performance.now();
    const dt = Math.min(100, now - lastTimestamp);
    if (dt > 0) {
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      const speed = Math.hypot(dx, dy) / dt;
      cursorSpeed = Math.min(1, speed / 2); // normalize to 0..1 (max speed ~2px/ms)
      speedFactor = Math.min(0.8, cursorSpeed * 0.8);
    }
    lastX = e.clientX;
    lastY = e.clientY;
    lastTimestamp = now;
  }
  document.addEventListener('mousemove', updateCursorSpeed);

  function drawCircle(progress) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width/2;
    const centerY = canvas.height/2;
    const minRadius = 40;
    const maxRadius = 120;
    const radius = minRadius + progress * (maxRadius - minRadius);

    // Brightness increases with cursor speed
    const brightness = 0.7 + speedFactor * 0.5; // 0.7..1.2
    const r = Math.min(255, baseColor[0] * brightness);
    const g = Math.min(255, baseColor[1] * brightness);
    const b = Math.min(255, baseColor[2] * brightness);

    ctx.shadowBlur = 20;
    ctx.shadowColor = isDark ? '#fff' : '#000';
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, 2*Math.PI);
    ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function updatePhase() {
    if (!startTime) startTime = performance.now();
    const now = performance.now();
    const elapsed = (now - startTime) / 1000;
    let cycleTime = elapsed % (INHALE + EXHALE);
    let newPhase;
    let progress = 0;

    if (cycleTime < INHALE) {
      newPhase = 'inhale';
      progress = cycleTime / INHALE;
    } else {
      newPhase = 'exhale';
      progress = 1 - (cycleTime - INHALE) / EXHALE;
    }

    if (newPhase !== phase) {
      phase = newPhase;
      phaseSpan.textContent = phase;
    }

    let remaining = (INHALE + EXHALE) - cycleTime;
    if (phase === 'inhale') remaining = INHALE - cycleTime;
    else remaining = (INHALE + EXHALE) - cycleTime;
    timerSpan.textContent = Math.max(0, remaining).toFixed(1) + 's';

    drawCircle(progress);
    requestAnimationFrame(updatePhase);
  }

  resetBtn.addEventListener('click', () => {
    startTime = performance.now();
    phase = 'inhale';
    phaseSpan.textContent = 'inhale';
  });

  updatePhase();

  // Optional: update base color on theme change
  const observer = new MutationObserver(() => {
    const isDarkNew = document.documentElement.classList.contains('dark');
    baseColor = isDarkNew ? [255,255,255] : [0,0,0];
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
})();
</script>
