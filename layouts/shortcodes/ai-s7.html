<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 560 380" preserveAspectRatio="xMidYMid meet" style="max-width: 560px; width: 100%; height: auto;">
    <rect width="560" height="380" fill="#0a0a0a"/>
    <text x="280" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8e4dc" letter-spacing="0.06em">the reinforcement learning loop</text>
    <line x1="80" y1="50" x2="480" y2="50" stroke="#2a2622" stroke-width="1"/>

    <!-- Agent -->
    <rect x="60" y="128" width="148" height="72" rx="4" fill="#141210" stroke="#c8a56a" stroke-width="1.5" stroke-opacity="0.7"/>
    <text x="134" y="154" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8a56a" letter-spacing="0.1em">AGENT</text>
    <text x="134" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#e8e4dc">the learner</text>
    <text x="134" y="192" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52">decision maker</text>

    <!-- Environment -->
    <rect x="352" y="128" width="148" height="72" rx="4" fill="#141210" stroke="#4a4540" stroke-width="1.5"/>
    <text x="426" y="154" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.1em">ENVIRONMENT</text>
    <text x="426" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">the world</text>
    <text x="426" y="192" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52">responds to actions</text>

    <!-- Action arrow (agent → env, top) -->
    <line x1="210" y1="150" x2="350" y2="150" stroke="#3a3630" stroke-width="1.5"/>
    <polygon points="348,146 358,150 348,154" fill="#3a3630"/>
    <text x="280" y="144" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.08em">ACTION</text>

    <!-- Reward + State arrow (env → agent, bottom) -->
    <line x1="350" y1="180" x2="210" y2="180" stroke="#c8a56a" stroke-width="1.5" stroke-opacity="0.65"/>
    <polygon points="212,176 202,180 212,184" fill="#c8a56a" opacity="0.65"/>
    <text x="280" y="175" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8a56a">REWARD + STATE</text>

    <!-- State box below -->
    <rect x="196" y="252" width="168" height="44" rx="4" fill="#141210" stroke="#2a2622" stroke-width="1"/>
    <text x="280" y="270" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.1em">STATE</text>
    <text x="280" y="288" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">current situation</text>

    <!-- State → Agent dashed -->
    <path d="M280,252 L280,236 L134,236 L134,202" fill="none" stroke="#2e2c28" stroke-width="1" stroke-dasharray="3,5"/>

    <text x="280" y="326" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">goal: maximise cumulative reward over time</text>
    <line x1="60" y1="348" x2="500" y2="348" stroke="#2a2622" stroke-width="1"/>
    <text x="280" y="368" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">no labelled data. no predefined rules. just feedback.</text>
  </svg>
</div>
