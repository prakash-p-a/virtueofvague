<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 540 310" preserveAspectRatio="xMidYMid meet" style="max-width: 520px; width: 100%; height: auto;">
    <rect width="540" height="310" fill="#0a0a0a"/>
    <text x="270" y="28" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" letter-spacing="0.16em">THE BODY IS A TOOL. KEEP IT SHARP.</text>
    <line x1="100" y1="38" x2="440" y2="38" stroke="#2a2622" stroke-width="1"/>

    <!-- PURPOSE box at top (gold) -->
    <rect x="155" y="48" width="230" height="52" rx="2" fill="#111009" stroke="#c8a56a" stroke-width="1.5"/>
    <text x="270" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.16em">PURPOSE</text>
    <text x="270" y="88" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8a56a" font-style="italic">shows up when you're ready</text>

    <!-- Connecting lines from PURPOSE bottom (270, 100) to pillar tops -->
    <line x1="270" y1="100" x2="100" y2="175" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,5"/>
    <line x1="270" y1="100" x2="270" y2="175" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,5"/>
    <line x1="270" y1="100" x2="440" y2="175" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,5"/>

    <!-- Pillar 1: FITNESS -->
    <rect x="30" y="175" width="140" height="54" rx="2" fill="#111009" stroke="#3a3630" stroke-width="1"/>
    <text x="100" y="196" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.14em">FITNESS</text>
    <text x="100" y="216" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">strong enough to chase it</text>

    <!-- Pillar 2: KNOWLEDGE -->
    <rect x="200" y="175" width="140" height="54" rx="2" fill="#111009" stroke="#3a3630" stroke-width="1"/>
    <text x="270" y="196" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.14em">KNOWLEDGE</text>
    <text x="270" y="216" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">sharp enough to understand it</text>

    <!-- Pillar 3: MENTAL PEACE -->
    <rect x="370" y="175" width="140" height="54" rx="2" fill="#111009" stroke="#3a3630" stroke-width="1"/>
    <text x="440" y="196" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.14em">MENTAL PEACE</text>
    <text x="440" y="216" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">calm enough to receive it</text>

    <line x1="100" y1="278" x2="440" y2="278" stroke="#2a2622" stroke-width="1"/>
    <text x="270" y="296" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">i don't know what i'm here for yet. so i keep the tool ready.</text>
  </svg>
</div>
