<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 620 300" preserveAspectRatio="xMidYMid meet" style="max-width: 620px; width: 100%; height: auto;">
    <rect width="620" height="300" fill="#0a0a0a"/>
    <text x="310" y="38" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8e4dc" letter-spacing="0.06em">two ways to use Claude</text>
    <line x1="80" y1="52" x2="540" y2="52" stroke="#2a2622" stroke-width="1"/>

    <!-- Left: fancier search engine -->
    <rect x="55" y="68" width="225" height="178" fill="#111009" rx="2"/>
    <text x="168" y="96" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#6a5f52" letter-spacing="0.12em">FANCIER SEARCH ENGINE</text>
    <line x1="70" y1="106" x2="265" y2="106" stroke="#2a2622" stroke-width="1"/>
    <text x="168" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#a89880">one question per tab</text>
    <text x="168" y="152" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#a89880">starts blank every time</text>
    <text x="168" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#a89880">copy. close. repeat.</text>
    <text x="168" y="218" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">leaving value on the table</text>

    <!-- Arrow -->
    <line x1="307" y1="90" x2="307" y2="230" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,4"/>
    <text x="307" y="163" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#c8a56a">→</text>

    <!-- Right: thinking partner -->
    <rect x="340" y="68" width="225" height="178" fill="#111009" rx="2"/>
    <text x="453" y="96" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#c8a56a" letter-spacing="0.12em">THINKING PARTNER</text>
    <line x1="355" y1="106" x2="550" y2="106" stroke="#2a2622" stroke-width="1"/>
    <text x="453" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">knows your context</text>
    <text x="453" y="152" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">iterates with you</text>
    <text x="453" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">moves at your pace</text>
    <text x="453" y="218" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8a56a" font-style="italic">working with Claude</text>

    <line x1="80" y1="265" x2="540" y2="265" stroke="#2a2622" stroke-width="1"/>
    <text x="310" y="285" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">same tool. different relationship.</text>
  </svg>
</div>
