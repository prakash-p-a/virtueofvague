<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 640 400" preserveAspectRatio="xMidYMid meet" style="max-width: 640px; width: 100%; height: auto;">
    <rect width="640" height="400" fill="#0a0a0a"/>
    <text x="320" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8e4dc" letter-spacing="0.06em">two tools for two types of data</text>
    <line x1="80" y1="50" x2="560" y2="50" stroke="#2a2622" stroke-width="1"/>

    <!-- Divider -->
    <line x1="320" y1="58" x2="320" y2="358" stroke="#1e1c1a" stroke-width="1"/>

    <!-- LEFT: CNN -->
    <text x="160" y="78" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#a89880" letter-spacing="0.1em">CNN</text>
    <text x="160" y="96" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">for grids and images</text>

    <!-- Grid (binary/image input) -->
    <g fill="#2a2622" stroke="#3a3630" stroke-width="0.5">
      <rect x="56" y="112" width="20" height="20"/><rect x="78" y="112" width="20" height="20"/>
      <rect x="100" y="112" width="20" height="20"/><rect x="122" y="112" width="20" height="20"/>
      <rect x="56" y="134" width="20" height="20"/><rect x="78" y="134" width="20" height="20"/>
      <rect x="100" y="134" width="20" height="20"/><rect x="122" y="134" width="20" height="20"/>
      <rect x="56" y="156" width="20" height="20"/><rect x="78" y="156" width="20" height="20"/>
      <rect x="100" y="156" width="20" height="20"/><rect x="122" y="156" width="20" height="20"/>
      <rect x="56" y="178" width="20" height="20"/><rect x="78" y="178" width="20" height="20"/>
      <rect x="100" y="178" width="20" height="20"/><rect x="122" y="178" width="20" height="20"/>
    </g>
    <!-- Brighter pattern cells -->
    <rect x="78" y="112" width="20" height="20" fill="#5a5248" opacity="0.9"/>
    <rect x="100" y="134" width="20" height="20" fill="#5a5248" opacity="0.9"/>
    <rect x="78" y="156" width="20" height="20" fill="#5a5248" opacity="0.9"/>
    <rect x="100" y="178" width="20" height="20" fill="#5a5248" opacity="0.9"/>
    <!-- Filter box -->
    <rect x="78" y="112" width="42" height="42" fill="none" stroke="#c8a56a" stroke-width="1.5" stroke-opacity="0.7"/>
    <text x="99" y="169" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#c8a56a">filter</text>

    <!-- Arrow + shrinking maps -->
    <text x="166" y="152" font-family="Georgia,serif" font-size="16" fill="#2e2c28">→</text>
    <rect x="194" y="120" width="28" height="28" rx="2" fill="none" stroke="#4a4540" stroke-width="1.2"/>
    <rect x="230" y="128" width="20" height="20" rx="2" fill="none" stroke="#4a4540" stroke-width="1.2"/>
    <rect x="258" y="134" width="14" height="14" rx="2" fill="#141210" stroke="#c8a56a" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="224" y="172" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#6a5f52">conv → pool → classify</text>

    <text x="160" y="220" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.05em">malware binary → image</text>
    <text x="160" y="238" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">CNN classifies the family</text>
    <text x="160" y="256" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">no code execution required</text>

    <!-- RIGHT: RNN / LSTM -->
    <text x="480" y="78" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#a89880" letter-spacing="0.1em">RNN / LSTM</text>
    <text x="480" y="96" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">for sequences and logs</text>

    <!-- Sequence boxes -->
    <rect x="338" y="120" width="48" height="38" rx="3" fill="#141210" stroke="#3a3630" stroke-width="1.2"/>
    <text x="362" y="141" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">t=1</text>
    <text x="362" y="154" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4a4540">login</text>

    <line x1="388" y1="139" x2="406" y2="139" stroke="#3a3630" stroke-width="1.2"/>
    <polygon points="404,136 412,139 404,142" fill="#3a3630"/>

    <rect x="412" y="120" width="48" height="38" rx="3" fill="#141210" stroke="#3a3630" stroke-width="1.2"/>
    <text x="436" y="141" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">t=2</text>
    <text x="436" y="154" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4a4540">access</text>

    <line x1="462" y1="139" x2="480" y2="139" stroke="#3a3630" stroke-width="1.2"/>
    <polygon points="478,136 486,139 478,142" fill="#3a3630"/>

    <rect x="486" y="120" width="48" height="38" rx="3" fill="#141210" stroke="#c8a56a" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="510" y="141" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8a56a">t=3</text>
    <text x="510" y="154" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#6a5f52">exfil?</text>

    <!-- Hidden state loop -->
    <path d="M362,120 Q362,96 436,96 Q510,96 510,120" fill="none" stroke="#2e2c28" stroke-width="1" stroke-dasharray="3,4"/>
    <text x="436" y="92" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#6a5f52">hidden state (memory)</text>

    <text x="480" y="220" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.05em">user behaviour over time</text>
    <text x="480" y="238" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">sequence matters as much</text>
    <text x="480" y="256" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">as the individual event</text>

    <line x1="40" y1="358" x2="600" y2="358" stroke="#2a2622" stroke-width="1"/>
    <text x="320" y="380" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">wrong tool, wrong result. CNNs for grids. RNNs for sequences.</text>
  </svg>
</div>
