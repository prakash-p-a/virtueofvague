<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 640 340" preserveAspectRatio="xMidYMid meet" style="max-width: 640px; width: 100%; height: auto;">
    <rect width="640" height="340" fill="#0a0a0a"/>
    <text x="320" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8e4dc" letter-spacing="0.06em">how supervised learning works</text>
    <line x1="120" y1="50" x2="520" y2="50" stroke="#2a2622" stroke-width="1"/>

    <!-- Step 1: Labelled data -->
    <rect x="30" y="82" width="140" height="72" rx="4" fill="#141210" stroke="#3a3630" stroke-width="1.5"/>
    <text x="100" y="106" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.1em">LABELLED DATA</text>
    <text x="100" y="126" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">spam / not spam</text>
    <text x="100" y="143" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">malicious / benign</text>

    <!-- Arrow 1 -->
    <line x1="172" y1="118" x2="228" y2="118" stroke="#3a3630" stroke-width="1.5"/>
    <polygon points="226,114 236,118 226,122" fill="#3a3630"/>

    <!-- Step 2: Training -->
    <rect x="238" y="82" width="120" height="72" rx="4" fill="#141210" stroke="#4a4540" stroke-width="1.5"/>
    <text x="298" y="106" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.1em">TRAINING</text>
    <text x="298" y="126" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">model finds</text>
    <text x="298" y="143" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">the pattern</text>

    <!-- Arrow 2 -->
    <line x1="360" y1="118" x2="416" y2="118" stroke="#3a3630" stroke-width="1.5"/>
    <polygon points="414,114 424,118 414,122" fill="#3a3630"/>

    <!-- Step 3: Model -->
    <rect x="426" y="74" width="120" height="88" rx="4" fill="#141210" stroke="#c8a56a" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="486" y="100" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8a56a" letter-spacing="0.1em">TRAINED MODEL</text>
    <text x="486" y="120" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">give it new data</text>
    <text x="486" y="137" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">get a prediction</text>
    <circle cx="486" cy="118" r="4" fill="#c8a56a" opacity="0.5"/>

    <!-- Divider -->
    <line x1="30" y1="210" x2="610" y2="210" stroke="#1e1c1a" stroke-width="1"/>
    <text x="320" y="204" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#3a3630" letter-spacing="0.1em">TWO TYPES OF OUTPUT</text>

    <!-- Classification -->
    <rect x="80" y="224" width="180" height="60" rx="4" fill="#141210" stroke="#3a3630" stroke-width="1"/>
    <text x="170" y="246" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.1em">CLASSIFICATION</text>
    <text x="170" y="266" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52">output: a category</text>
    <text x="170" y="281" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#4a4540">malicious / benign</text>

    <!-- Regression -->
    <rect x="380" y="224" width="180" height="60" rx="4" fill="#141210" stroke="#3a3630" stroke-width="1"/>
    <text x="470" y="246" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.1em">REGRESSION</text>
    <text x="470" y="266" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52">output: a number</text>
    <text x="470" y="281" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#4a4540">risk score 0.0 – 1.0</text>

    <line x1="30" y1="316" x2="610" y2="316" stroke="#2a2622" stroke-width="1"/>
    <text x="320" y="334" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">you've been labelling training data every single shift.</text>
  </svg>
</div>
