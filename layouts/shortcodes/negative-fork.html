<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 540 430" preserveAspectRatio="xMidYMid meet" style="max-width: 540px; width: 100%; height: auto;">
    <rect width="540" height="430" fill="#0a0a0a"/>
    <text x="270" y="28" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" letter-spacing="0.16em">SAME FEAR. TWO PATHS.</text>
    <line x1="100" y1="38" x2="440" y2="38" stroke="#2a2622" stroke-width="1"/>

    <!-- Root node: the fear (gold border) -->
    <rect x="155" y="48" width="230" height="54" rx="2" fill="#111009" stroke="#c8a56a" stroke-width="1.5"/>
    <text x="270" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#e8e4dc">"something might go wrong"</text>
    <text x="270" y="88" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.1em">THE NEGATIVE THOUGHT</text>

    <!-- Fork lines from bottom of root (270, 102) -->
    <line x1="270" y1="102" x2="270" y2="118" stroke="#3a3630" stroke-width="1.5"/>
    <line x1="270" y1="118" x2="118" y2="148" stroke="#3a3630" stroke-width="1.5"/>
    <line x1="270" y1="118" x2="422" y2="148" stroke="#3a3630" stroke-width="1.5"/>

    <!-- Left column header -->
    <text x="118" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#a89880" letter-spacing="0.14em">NEGATIVE THINKING</text>

    <!-- Right column header -->
    <text x="422" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#6a5f52" letter-spacing="0.14em">OVERTHINKING</text>

    <!-- Left box 1: PREPARE -->
    <rect x="38" y="170" width="160" height="52" rx="2" fill="#111009" stroke="#a89880" stroke-width="1"/>
    <text x="118" y="191" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8e4dc">prepare</text>
    <text x="118" y="208" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880">one backup plan</text>

    <line x1="118" y1="222" x2="118" y2="232" stroke="#a89880" stroke-width="1"/>
    <polygon points="113,230 123,230 118,238" fill="#a89880"/>

    <!-- Left box 2: ACTION -->
    <rect x="38" y="240" width="160" height="52" rx="2" fill="#111009" stroke="#a89880" stroke-width="1"/>
    <text x="118" y="261" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8e4dc">take action</text>
    <text x="118" y="278" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880">fear becomes fuel</text>

    <line x1="118" y1="292" x2="118" y2="302" stroke="#a89880" stroke-width="1"/>
    <polygon points="113,300 123,300 118,308" fill="#a89880"/>

    <!-- Left box 3: READY -->
    <rect x="38" y="310" width="160" height="52" rx="2" fill="#111009" stroke="#a89880" stroke-width="1.5"/>
    <text x="118" y="331" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#c8a56a">ready</text>
    <text x="118" y="349" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880">when it goes wrong — you move</text>

    <!-- Right box 1: OVERTHINK -->
    <rect x="342" y="170" width="160" height="52" rx="2" fill="#111009" stroke="#4a4540" stroke-width="1"/>
    <text x="422" y="191" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#c8c0b4">spiral</text>
    <text x="422" y="208" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">47 versions of disaster</text>

    <line x1="422" y1="222" x2="422" y2="232" stroke="#4a4540" stroke-width="1"/>
    <polygon points="417,230 427,230 422,238" fill="#4a4540"/>

    <!-- Right box 2: PARALYSIS -->
    <rect x="342" y="240" width="160" height="52" rx="2" fill="#111009" stroke="#4a4540" stroke-width="1"/>
    <text x="422" y="261" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#c8c0b4">paralysis</text>
    <text x="422" y="278" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">stuck. can't decide. can't move.</text>

    <line x1="422" y1="292" x2="422" y2="302" stroke="#4a4540" stroke-width="1"/>
    <polygon points="417,300 427,300 422,308" fill="#4a4540"/>

    <!-- Right box 3: FAILED -->
    <rect x="342" y="310" width="160" height="52" rx="2" fill="#111009" stroke="#4a4540" stroke-width="1"/>
    <text x="422" y="331" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#6a5f52">failed anyway</text>
    <text x="422" y="349" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#4a4540">and exhausted on top of it</text>

    <line x1="100" y1="380" x2="440" y2="380" stroke="#2a2622" stroke-width="1"/>
    <text x="270" y="400" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">be scared enough to prepare. not scared enough to break.</text>
  </svg>
</div>
