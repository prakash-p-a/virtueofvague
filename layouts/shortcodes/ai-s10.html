<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 640 370" preserveAspectRatio="xMidYMid meet" style="max-width: 640px; width: 100%; height: auto;">
    <rect width="640" height="370" fill="#0a0a0a"/>
    <text x="320" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8e4dc" letter-spacing="0.06em">how a large language model works</text>
    <line x1="80" y1="50" x2="560" y2="50" stroke="#2a2622" stroke-width="1"/>

    <!-- Step 1: Text input -->
    <rect x="18" y="88" width="84" height="58" rx="4" fill="#141210" stroke="#3a3630" stroke-width="1.2"/>
    <text x="60" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#a89880" letter-spacing="0.08em">INPUT</text>
    <text x="60" y="129" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">"detect</text>
    <text x="60" y="143" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8c0b4">threats"</text>
    <line x1="103" y1="117" x2="121" y2="117" stroke="#3a3630" stroke-width="1.2"/>
    <polygon points="119,113 127,117 119,121" fill="#3a3630"/>

    <!-- Step 2: Tokenise -->
    <rect x="128" y="88" width="96" height="58" rx="4" fill="#141210" stroke="#3a3630" stroke-width="1.2"/>
    <text x="176" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#a89880" letter-spacing="0.08em">TOKENISE</text>
    <text x="176" y="129" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">"de""tect"</text>
    <text x="176" y="143" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">"threats"</text>
    <line x1="225" y1="117" x2="243" y2="117" stroke="#3a3630" stroke-width="1.2"/>
    <polygon points="241,113 249,117 241,121" fill="#3a3630"/>

    <!-- Step 3: Embed -->
    <rect x="250" y="88" width="96" height="58" rx="4" fill="#141210" stroke="#3a3630" stroke-width="1.2"/>
    <text x="298" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#a89880" letter-spacing="0.08em">EMBED</text>
    <text x="298" y="129" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">tokens →</text>
    <text x="298" y="143" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">vectors</text>
    <line x1="347" y1="117" x2="365" y2="117" stroke="#3a3630" stroke-width="1.2"/>
    <polygon points="363,113 371,117 363,121" fill="#3a3630"/>

    <!-- Step 4: Self-attention (highlighted) -->
    <rect x="372" y="80" width="112" height="74" rx="4" fill="#141210" stroke="#c8a56a" stroke-width="1.5" stroke-opacity="0.7"/>
    <text x="428" y="102" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#c8a56a" letter-spacing="0.06em">SELF-ATTENTION</text>
    <text x="428" y="120" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">each token weighs</text>
    <text x="428" y="136" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">all other tokens</text>
    <text x="428" y="148" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#6a5f52">context captured</text>
    <line x1="485" y1="117" x2="503" y2="117" stroke="#3a3630" stroke-width="1.2"/>
    <polygon points="501,113 509,117 501,121" fill="#3a3630"/>

    <!-- Step 5: Output -->
    <rect x="510" y="88" width="96" height="58" rx="4" fill="#141210" stroke="#4a4540" stroke-width="1.2"/>
    <text x="558" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#a89880" letter-spacing="0.08em">OUTPUT</text>
    <text x="558" y="129" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">next token</text>
    <text x="558" y="143" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">predicted</text>

    <!-- Self-attention visual -->
    <text x="320" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#a89880" letter-spacing="0.06em">self-attention in action:</text>

    <!-- Token row -->
    <rect x="50" y="216" width="64" height="28" rx="3" fill="#141210" stroke="#3a3630" stroke-width="1"/>
    <text x="82" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">detect</text>
    <rect x="134" y="216" width="64" height="28" rx="3" fill="#141210" stroke="#3a3630" stroke-width="1"/>
    <text x="166" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">malware</text>
    <rect x="218" y="216" width="64" height="28" rx="3" fill="#141210" stroke="#3a3630" stroke-width="1"/>
    <text x="250" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">in</text>
    <rect x="302" y="216" width="64" height="28" rx="3" fill="#141210" stroke="#3a3630" stroke-width="1"/>
    <text x="334" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52">the</text>
    <rect x="386" y="216" width="64" height="28" rx="3" fill="#141210" stroke="#c8a56a" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="418" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8a56a">network</text>

    <!-- Attention arcs: "network" attends strongly to "detect" and "malware" -->
    <path d="M418,216 Q250,184 82,216" fill="none" stroke="#c8a56a" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="2,4"/>
    <path d="M418,216 Q292,192 166,216" fill="none" stroke="#c8a56a" stroke-width="1" stroke-opacity="0.6" stroke-dasharray="2,4"/>
    <text x="248" y="192" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#c8a56a" opacity="0.7">strong attention</text>

    <line x1="40" y1="334" x2="600" y2="334" stroke="#2a2622" stroke-width="1"/>
    <text x="320" y="354" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">one token at a time — but attention sees the whole context.</text>
  </svg>
</div>
