<div class="million-years-container" style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 680 820" preserveAspectRatio="xMidYMid meet" style="max-width: 100%; height: auto; width: auto;">
    <style>
      .bg { fill: #0a0a0a; }
      .title { font-family: Georgia, serif; font-size: 13px; fill: #888; letter-spacing: 0.18em; font-weight: 400; }
      .big-title { font-family: Georgia, serif; font-size: 28px; fill: #e8e4dc; font-weight: 400; letter-spacing: 0.04em; }
      .label { font-family: Georgia, serif; font-size: 11px; fill: #a89880; letter-spacing: 0.12em; font-weight: 400; }
      .body { font-family: Georgia, serif; font-size: 15px; fill: #c8c0b4; font-weight: 400; line-height: 1.6; }
      .kicker { font-family: Georgia, serif; font-size: 16px; fill: #e8e4dc; font-style: italic; font-weight: 400; }
      .connector { stroke: #3a3630; stroke-width: 1px; fill: none; }
      .dot { fill: #6a5f52; }
      
      /* Mobile adjustments */
      @media (max-width: 600px) {
        .big-title { font-size: 20px; }
        .label { font-size: 9px; }
        .body { font-size: 11px; }
        .kicker { font-size: 13px; }
      }
    </style>

    <rect width="680" height="820" class="bg"/>

    <text x="340" y="96" text-anchor="middle" class="big-title">The million years</text>
    <text x="340" y="128" text-anchor="middle" class="big-title">vs. the one second</text>

    <line x1="200" y1="150" x2="480" y2="150" stroke="#2a2622" stroke-width="1"/>

    <circle cx="340" cy="188" r="3.5" class="dot"/>
    <text x="340" y="178" text-anchor="middle" class="label">THE SECOND BEFORE</text>
    <text x="340" y="206" text-anchor="middle" class="body">Your prefrontal cortex fires. Neurons</text>
    <text x="340" y="225" text-anchor="middle" class="body">primed by what happened five minutes ago.</text>

    <path d="M340 240 Q340 262 340 278" class="connector" stroke-dasharray="2,4"/>

    <circle cx="340" cy="282" r="3.5" class="dot"/>
    <text x="340" y="272" text-anchor="middle" class="label">THE HOURS BEFORE</text>
    <text x="340" y="300" text-anchor="middle" class="body">Your hormones. Cortisol if you're stressed,</text>
    <text x="340" y="319" text-anchor="middle" class="body">testosterone if you're fired up.</text>

    <path d="M340 334 Q340 356 340 372" class="connector" stroke-dasharray="2,4"/>

    <circle cx="340" cy="376" r="3.5" class="dot"/>
    <text x="340" y="366" text-anchor="middle" class="label">THE YEARS BEFORE</text>
    <text x="340" y="394" text-anchor="middle" class="body">Your childhood. Your trauma. The patterns</text>
    <text x="340" y="413" text-anchor="middle" class="body">your brain wired itself into.</text>

    <path d="M340 428 Q340 450 340 466" class="connector" stroke-dasharray="2,4"/>

    <circle cx="340" cy="470" r="3.5" class="dot"/>
    <text x="340" y="460" text-anchor="middle" class="label">THE CENTURIES BEFORE</text>
    <text x="340" y="488" text-anchor="middle" class="body">Your culture. The values your ancestors</text>
    <text x="340" y="507" text-anchor="middle" class="body">passed down. The rituals you never questioned.</text>

    <path d="M340 522 Q340 544 340 560" class="connector" stroke-dasharray="2,4"/>

    <circle cx="340" cy="564" r="3.5" class="dot"/>
    <text x="340" y="554" text-anchor="middle" class="label">THE MILLION YEARS BEFORE</text>
    <text x="340" y="582" text-anchor="middle" class="body">Evolution. The ancient reptile brain that</text>
    <text x="340" y="601" text-anchor="middle" class="body">still thinks a loud noise means a predator.</text>

    <path d="M340 616 Q340 650 340 670" class="connector" stroke-dasharray="2,6"/>

    <line x1="220" y1="674" x2="460" y2="674" stroke="#2a2622" stroke-width="1"/>

    <text x="340" y="710" text-anchor="middle" class="kicker">Here's the kicker:</text>
    <text x="340" y="742" text-anchor="middle" class="kicker">you didn't choose any of it.</text>

    <circle cx="340" cy="785" r="2" fill="#3a3630"/>
    <circle cx="320" cy="785" r="1.5" fill="#2a2622"/>
    <circle cx="360" cy="785" r="1.5" fill="#2a2622"/>
  </svg>
</div>
