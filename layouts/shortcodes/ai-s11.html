<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 640 340" preserveAspectRatio="xMidYMid meet" style="max-width: 640px; width: 100%; height: auto;">
    <rect width="640" height="340" fill="#0a0a0a"/>
    <text x="320" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8e4dc" letter-spacing="0.06em">how diffusion models work</text>
    <line x1="80" y1="50" x2="560" y2="50" stroke="#2a2622" stroke-width="1"/>

    <line x1="38" y1="116" x2="122" y2="84" stroke="#5a5248" stroke-width="2" opacity="0.7"/>

    <text x="80" y="196" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#6a5f52">x₀</text>

    <!-- Arrow -->
    <text x="138" y="134" font-family="Georgia,serif" font-size="14" fill="#2a2622">→</text>

    <!-- Stage 2: Slight noise -->
    <rect x="158" y="84" width="84" height="84" rx="3" fill="#141210" stroke="#4a4540" stroke-width="1"/>
    <line x1="158" y1="116" x2="242" y2="84" stroke="#4a4540" stroke-width="1.5" opacity="0.5"/>
    <circle cx="172" cy="100" r="2" fill="#3a3630" opacity="0.8"/>

    <circle cx="228" cy="112" r="2" fill="#3a3630" opacity="0.8"/>

    <text x="200" y="196" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4a4540">xₜ₋₅</text>

    <!-- Arrow -->
    <text x="258" y="134" font-family="Georgia,serif" font-size="14" fill="#2a2622">→</text>

    <!-- Stage 3: More noise -->
    <rect x="278" y="84" width="84" height="84" rx="3" fill="#111009" stroke="#3a3630" stroke-width="1"/>
    <circle cx="290" cy="100" r="2.5" fill="#3a3630" opacity="0.9"/>
    <circle cx="318" cy="114" r="2.5" fill="#3a3630" opacity="0.9"/>
    <circle cx="298" cy="136" r="2.5" fill="#3a3630" opacity="0.8"/>
    <circle cx="348" cy="122" r="2.5" fill="#3a3630" opacity="0.9"/>

    <text x="320" y="196" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#4a4540">xₜ₋₂</text>

    <!-- Arrow -->
    <text x="378" y="134" font-family="Georgia,serif" font-size="14" fill="#2a2622">→</text>

    <!-- Stage 4: Pure noise -->
    <rect x="398" y="84" width="84" height="84" rx="3" fill="#0d0c0a" stroke="#2a2622" stroke-width="1"/>
    <circle cx="410" cy="96" r="2" fill="#3a3630" opacity="0.9"/>

    <circle cx="452" cy="96" r="2" fill="#3a3630" opacity="0.9"/>
    <circle cx="416" cy="132" r="2" fill="#3a3630" opacity="0.9"/>
    <circle cx="476" cy="118" r="2" fill="#3a3630" opacity="0.9"/>
    <circle cx="458" cy="148" r="2" fill="#3a3630" opacity="0.9"/>
    <circle cx="428" cy="158" r="2" fill="#3a3630" opacity="0.9"/>
    <circle cx="470" cy="104" r="2" fill="#3a3630" opacity="0.9"/>

    <!-- Reverse process arrow (bottom, R→L) -->
    <line x1="556" y1="240" x2="68" y2="240" stroke="#c8a56a" stroke-width="1" stroke-opacity="0.45"/>
    <polygon points="70,237 62,240 70,243" fill="#c8a56a" opacity="0.45"/>
    <text x="312" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#c8a56a" letter-spacing="0.08em">REVERSE — neural network removes noise step by step</text>

    <!-- Neural network box -->
    <rect x="196" y="256" width="248" height="44" rx="4" fill="#141210" stroke="#c8a56a" stroke-width="1.5" stroke-opacity="0.55"/>
    <text x="320" y="275" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.08em">TRAINED NEURAL NETWORK</text>
    <text x="320" y="292" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8c0b4">predict and subtract noise at each step</text>

    <line x1="60" y1="316" x2="580" y2="316" stroke="#2a2622" stroke-width="1"/>
    <text x="320" y="332" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">learn to destroy. then learn to create. that's diffusion.</text>

</div>
