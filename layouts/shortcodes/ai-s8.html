    <line x1="40" y1="362" x2="560" y2="362" stroke="#2a2622" stroke-width="1"/>
    <text x="300" y="382" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">more hidden layers = deeper network = deep learning.</text>
