<div style="margin: 2rem auto; display: flex; justify-content: center; width: 100%;">
  <svg viewBox="0 0 560 520" preserveAspectRatio="xMidYMid meet" style="max-width: 520px; width: 100%; height: auto;">
    <rect width="560" height="520" fill="#0a0a0a"/>
    <text x="280" y="30" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" letter-spacing="0.16em">SAME INPUT. DIFFERENT FILTER. DIFFERENT REALITY.</text>
    <line x1="100" y1="40" x2="460" y2="40" stroke="#2a2622" stroke-width="1"/>

    <!-- Center circle: the sea -->
    <circle cx="280" cy="268" r="64" fill="#0e0d0c" stroke="#3a3630" stroke-width="1.5"/>
    <text x="280" y="260" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#a89880" letter-spacing="0.1em">THE SAME</text>
    <text x="280" y="278" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#e8e4dc">sea</text>
    <circle cx="280" cy="268" r="4" fill="#c8a56a" opacity="0.5"/>

    <!-- Spokes (r=148 from center, to small circles) -->
    <!-- Top: FISHERMAN at 270° standard (top) -->
    <line x1="280" y1="204" x2="280" y2="120" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="280" cy="116" r="3" fill="#4a4540"/>
    <text x="280" y="99" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.12em">FISHERMAN</text>
    <text x="280" y="114" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" dy="0"/>
    <text x="280" y="84" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">"where's my catch?"</text>

    <!-- Upper right: TOURIST at 342° standard -->
    <!-- cos(342°)=0.951, sin(342°)=-0.309; spoke end: x=280+148*0.951=421, y=268-148*0.309=222 -->
    <line x1="335" y1="237" x2="419" y2="222" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="423" cy="222" r="3" fill="#4a4540"/>
    <text x="450" y="210" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.12em">TOURIST</text>
    <text x="450" y="224" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">"nice photos"</text>

    <!-- Lower right: INSTAGRAMMER at 54° standard -->
    <!-- cos(54°)=0.588, sin(54°)=0.809; end: x=280+148*0.588=367, y=268+148*0.809=388 -->
    <line x1="326" y1="312" x2="363" y2="384" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="367" cy="388" r="3" fill="#4a4540"/>
    <text x="375" y="400" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.12em">INSTAGRAMMER</text>
    <text x="375" y="414" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">"is this a reel?"</text>

    <!-- Lower left: CAPITALIST at 126° standard -->
    <!-- cos(126°)=-0.588, sin(126°)=0.809; end: x=280-148*0.588=193, y=268+148*0.809=388 -->
    <line x1="234" y1="312" x2="197" y2="384" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="193" cy="388" r="3" fill="#4a4540"/>
    <text x="185" y="400" text-anchor="end" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.12em">CAPITALIST</text>
    <text x="185" y="414" text-anchor="end" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">"how do i charge for this?"</text>

    <!-- Upper left: SHARK at 198° standard -->
    <!-- cos(198°)=-0.951, sin(198°)=-0.309; end: x=280-148*0.951=139, y=268-148*0.309=222 -->
    <line x1="225" y1="237" x2="141" y2="222" stroke="#3a3630" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="137" cy="222" r="3" fill="#4a4540"/>
    <text x="110" y="210" text-anchor="end" font-family="Georgia,serif" font-size="10" fill="#a89880" letter-spacing="0.12em">SHARK</text>
    <text x="110" y="224" text-anchor="end" font-family="Georgia,serif" font-size="10" fill="#6a5f52" font-style="italic">"where's my food?"</text>

    <line x1="100" y1="478" x2="460" y2="478" stroke="#2a2622" stroke-width="1"/>
    <text x="280" y="497" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a5f52" font-style="italic">the sea doesn't change. the filter does.</text>
    <text x="280" y="513" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#3a3630" letter-spacing="0.08em">your filter is your current mood, history, and hunger</text>
  </svg>
</div>
