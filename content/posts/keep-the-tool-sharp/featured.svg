<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice"
     role="img" aria-label="a whetstone on a dark surface with a blade resting across it, gold light catching the edge">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="85%">
      <stop offset="0%" stop-color="var(--hero-bg-1)"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)"/>
    </radialGradient>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="var(--hero-stone-warm)"/>
      <stop offset="100%" stop-color="var(--hero-stone)"/>
    </linearGradient>
    <radialGradient id="glint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--hero-gold)" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="var(--hero-gold)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <line x1="0" y1="640" x2="1600" y2="640" stroke="var(--hero-edge)" stroke-opacity="0.38" stroke-width="1"/>

  <ellipse cx="800" cy="648" rx="330" ry="14" fill="var(--hero-bg-3)" opacity="0.6"/>

  <rect x="480" y="520" width="640" height="95" rx="7" fill="url(#stoneGrad)" opacity="0.88"/>
  <rect x="480" y="520" width="640" height="95" rx="7" fill="none"
        stroke="var(--hero-edge)" stroke-opacity="0.5" stroke-width="1.5"/>

  <line x1="498" y1="544" x2="1102" y2="544" stroke="var(--hero-mute)" stroke-opacity="0.14" stroke-width="0.8"/>
  <line x1="498" y1="562" x2="1102" y2="562" stroke="var(--hero-mute)" stroke-opacity="0.11" stroke-width="0.8"/>
  <line x1="498" y1="580" x2="1102" y2="580" stroke="var(--hero-mute)" stroke-opacity="0.09" stroke-width="0.8"/>
  <line x1="498" y1="598" x2="1102" y2="598" stroke="var(--hero-mute)" stroke-opacity="0.07" stroke-width="0.8"/>

  <rect x="488" y="521" width="624" height="9" rx="4" fill="var(--hero-paper)" opacity="0.09"/>

  <rect x="290" y="560" width="195" height="40" rx="8" fill="var(--hero-stone-warm)" opacity="0.82"/>
  <rect x="290" y="560" width="195" height="40" rx="8" fill="none"
        stroke="var(--hero-edge)" stroke-opacity="0.42" stroke-width="1.2"/>
  <circle cx="330" cy="580" r="4" fill="var(--hero-mute)" opacity="0.45"/>
  <circle cx="370" cy="580" r="4" fill="var(--hero-mute)" opacity="0.45"/>
  <circle cx="410" cy="580" r="4" fill="var(--hero-mute)" opacity="0.45"/>

  <rect x="482" y="556" width="18" height="48" rx="3" fill="var(--hero-mute)" opacity="0.62"/>

  <polygon points="500,555 1160,512 1160,533 500,578" fill="var(--hero-paper)" opacity="0.48"/>
  <line x1="500" y1="555" x2="1160" y2="512"
        stroke="var(--hero-mute)" stroke-width="2.5" stroke-opacity="0.62"/>
  <line x1="500" y1="578" x2="1160" y2="533"
        stroke="var(--hero-gold)" stroke-width="1.8" stroke-opacity="0.82"/>

  <polygon points="1140,513 1160,512 1160,533 1148,531" fill="var(--hero-gold)" opacity="0.4"/>

  <circle cx="780" cy="560" r="26" fill="url(#glint)"/>
  <circle cx="780" cy="560" r="3" fill="var(--hero-gold)" opacity="0.88"/>
  <circle cx="758" cy="566" r="1.2" fill="var(--hero-gold)" opacity="0.45"/>
  <circle cx="798" cy="553" r="1" fill="var(--hero-gold)" opacity="0.38"/>
  <circle cx="744" cy="570" r="0.9" fill="var(--hero-gold)" opacity="0.3"/>
</svg>
