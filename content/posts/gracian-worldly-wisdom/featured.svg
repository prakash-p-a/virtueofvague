<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice"
     role="img" aria-label="a single open eye looking directly at you — 400 years of wisdom seeing your blind spots">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="var(--hero-bg-1)"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--hero-gold)" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="var(--hero-gold)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="var(--hero-gold)" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="var(--hero-gold)" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="var(--hero-gold)" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="40%" cy="38%" r="65%">
      <stop offset="0%" stop-color="var(--hero-bg-1)" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)" stop-opacity="0.98"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- ambient radiance emanating from the eye -->
  <ellipse cx="800" cy="450" rx="420" ry="220" fill="url(#eyeGlow)"/>

  <!-- faint manuscript lines above — aphorisms on a page -->
  <line x1="572" y1="318" x2="1028" y2="318" stroke="var(--hero-edge)" stroke-width="0.9" stroke-opacity="0.14" stroke-dasharray="22,14"/>
  <line x1="572" y1="338" x2="1028" y2="338" stroke="var(--hero-edge)" stroke-width="0.9" stroke-opacity="0.10" stroke-dasharray="18,16"/>
  <line x1="572" y1="358" x2="1028" y2="358" stroke="var(--hero-edge)" stroke-width="0.8" stroke-opacity="0.07" stroke-dasharray="26,12"/>

  <!-- faint manuscript lines below -->
  <line x1="572" y1="542" x2="1028" y2="542" stroke="var(--hero-edge)" stroke-width="0.9" stroke-opacity="0.14" stroke-dasharray="22,14"/>
  <line x1="572" y1="562" x2="1028" y2="562" stroke="var(--hero-edge)" stroke-width="0.9" stroke-opacity="0.10" stroke-dasharray="18,16"/>
  <line x1="572" y1="582" x2="1028" y2="582" stroke="var(--hero-edge)" stroke-width="0.8" stroke-opacity="0.07" stroke-dasharray="26,12"/>

  <!-- iris fill -->
  <circle cx="800" cy="450" r="86" fill="url(#irisGrad)"/>

  <!-- iris ring: outer -->
  <circle cx="800" cy="450" r="86" fill="none" stroke="var(--hero-gold)" stroke-width="1.8" stroke-opacity="0.58"/>

  <!-- iris texture: concentric rings (tree rings of time) -->
  <circle cx="800" cy="450" r="70" fill="none" stroke="var(--hero-gold)" stroke-width="0.9" stroke-opacity="0.28"/>
  <circle cx="800" cy="450" r="54" fill="none" stroke="var(--hero-gold)" stroke-width="0.7" stroke-opacity="0.20"/>

  <!-- iris texture: radial spokes (8, very faint) -->
  <!-- from pupil edge r=32 to iris inner ring r=52 -->
  <line x1="832" y1="450" x2="852" y2="450" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="823" y1="473" x2="836" y2="491" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="800" y1="482" x2="800" y2="502" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="777" y1="473" x2="764" y2="491" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="768" y1="450" x2="748" y2="450" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="777" y1="427" x2="764" y2="409" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="800" y1="418" x2="800" y2="398" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="823" y1="427" x2="836" y2="409" stroke="var(--hero-gold)" stroke-width="0.8" stroke-opacity="0.18"/>

  <!-- pupil -->
  <circle cx="800" cy="450" r="31" fill="url(#pupilGrad)"/>
  <circle cx="800" cy="450" r="31" fill="none" stroke="var(--hero-bg-3)" stroke-width="1.5" stroke-opacity="0.60"/>

  <!-- catch light — the reflection of someone reading in 2026 -->
  <circle cx="812" cy="439" r="7" fill="var(--hero-bright)" opacity="0.65"/>
  <circle cx="817" cy="444" r="3" fill="var(--hero-bright)" opacity="0.30"/>

  <!-- eye outline: upper lid — curves up to ~y=361 -->
  <!-- r=270, from (600,450) to (1000,450), sweep=0 (ccw on screen = upward arc) -->
  <path d="M 600,450 A 270,270 0 0,0 1000,450"
        fill="none" stroke="var(--hero-stone)" stroke-width="2.2" stroke-opacity="0.68"
        stroke-linecap="round"/>

  <!-- eye outline: lower lid — curves down to ~y=539, thinner (natural asymmetry) -->
  <path d="M 600,450 A 270,270 0 0,1 1000,450"
        fill="none" stroke="var(--hero-stone)" stroke-width="1.6" stroke-opacity="0.52"
        stroke-linecap="round"/>

  <!-- corner dots -->
  <circle cx="600" cy="450" r="3" fill="var(--hero-stone)" opacity="0.55"/>
  <circle cx="1000" cy="450" r="3" fill="var(--hero-stone)" opacity="0.55"/>

  <!-- crow's feet: left corner — marks of 400 years -->
  <line x1="600" y1="450" x2="558" y2="438" stroke="var(--hero-mute)" stroke-width="1" stroke-opacity="0.32" stroke-linecap="round"/>
  <line x1="600" y1="450" x2="554" y2="450" stroke="var(--hero-mute)" stroke-width="1" stroke-opacity="0.24" stroke-linecap="round"/>
  <line x1="600" y1="450" x2="558" y2="462" stroke="var(--hero-mute)" stroke-width="1" stroke-opacity="0.32" stroke-linecap="round"/>

  <!-- crow's feet: right corner -->
  <line x1="1000" y1="450" x2="1042" y2="438" stroke="var(--hero-mute)" stroke-width="1" stroke-opacity="0.32" stroke-linecap="round"/>
  <line x1="1000" y1="450" x2="1046" y2="450" stroke="var(--hero-mute)" stroke-width="1" stroke-opacity="0.24" stroke-linecap="round"/>
  <line x1="1000" y1="450" x2="1042" y2="462" stroke="var(--hero-mute)" stroke-width="1" stroke-opacity="0.32" stroke-linecap="round"/>
</svg>
