<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice"
     role="img" aria-label="a cracked mirror — what you hate in others is what you won't look at in yourself">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="var(--hero-bg-1)"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)"/>
    </radialGradient>
    <radialGradient id="mirrorGlow" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="var(--hero-gold)" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="var(--hero-gold)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mirrorSurface" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="var(--hero-stone)" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="var(--hero-bg-2)" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)" stop-opacity="0.50"/>
    </radialGradient>
    <clipPath id="mirrorClip">
      <ellipse cx="800" cy="438" rx="178" ry="248"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- ambient glow — mirror radiates something -->
  <ellipse cx="800" cy="438" rx="390" ry="420" fill="url(#mirrorGlow)"/>

  <!-- mirror shadow on the wall — grounds it -->
  <ellipse cx="814" cy="698" rx="148" ry="16" fill="var(--hero-bg-3)" opacity="0.30"/>

  <!-- clipped interior: surface + crack stay inside the oval -->
  <g clip-path="url(#mirrorClip)">
    <!-- mirror surface — warm, subtle, not blank black -->
    <ellipse cx="800" cy="438" rx="178" ry="248" fill="url(#mirrorSurface)"/>

    <!-- crack: dark void (the fissure itself) -->
    <path d="M 710,185 L 810,445 L 890,695"
          fill="none" stroke="var(--hero-bg-3)" stroke-width="4" stroke-opacity="0.90"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- crack: bright glint along right edge — where light catches the break -->
    <path d="M 713,184 L 813,444 L 893,694"
          fill="none" stroke="var(--hero-bright)" stroke-width="1.2" stroke-opacity="0.55"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- frame: inner subtle ring -->
  <ellipse cx="800" cy="438" rx="178" ry="248"
           fill="none" stroke="var(--hero-edge)" stroke-width="1.2" stroke-opacity="0.40"/>

  <!-- frame: outer bezel — the main structural ring -->
  <ellipse cx="800" cy="438" rx="186" ry="256"
           fill="none" stroke="var(--hero-stone)" stroke-width="3.8" stroke-opacity="0.82"/>

  <!-- frame: outermost thin gold ring -->
  <ellipse cx="800" cy="438" rx="192" ry="263"
           fill="none" stroke="var(--hero-gold)" stroke-width="1.1" stroke-opacity="0.48"/>

  <!-- frame pip diamonds at cardinal points — baroque register, 1647 -->
  <!-- top: centered at (800, 175) -->
  <polygon points="800,167 808,175 800,183 792,175" fill="var(--hero-gold)" opacity="0.68"/>
  <!-- bottom: centered at (800, 701) -->
  <polygon points="800,693 808,701 800,709 792,701" fill="var(--hero-gold)" opacity="0.68"/>
  <!-- left: centered at (608, 438) -->
  <polygon points="600,438 608,430 616,438 608,446" fill="var(--hero-gold)" opacity="0.68"/>
  <!-- right: centered at (992, 438) -->
  <polygon points="984,438 992,430 1000,438 992,446" fill="var(--hero-gold)" opacity="0.68"/>
</svg>
