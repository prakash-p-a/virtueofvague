<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice"
     role="img" aria-label="an antique cracked mirror in a warm apartment reflecting a modern laptop workspace — ancient wisdom seeing the present">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="var(--hero-bg-1)"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)"/>
    </radialGradient>
    <!-- afternoon light flooding from left window -->
    <linearGradient id="windowLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="var(--hero-bright)" stop-opacity="0.24"/>
      <stop offset="58%"  stop-color="var(--hero-gold)"   stop-opacity="0.08"/>
      <stop offset="100%" stop-color="var(--hero-gold)"   stop-opacity="0"/>
    </linearGradient>
    <!-- mirror interior: the reflected workspace is a LIGHTER room -->
    <linearGradient id="reflectedWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="var(--hero-stone)" stop-opacity="0.50"/>
      <stop offset="50%"  stop-color="var(--hero-stone)" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="var(--hero-bg-2)"  stop-opacity="0.22"/>
    </linearGradient>
    <!-- laptop screen: the brightest point in the composition -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="var(--hero-bright)" stop-opacity="0.86"/>
      <stop offset="48%"  stop-color="var(--hero-bright)" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="var(--hero-bright)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="var(--hero-bright)" stop-opacity="0.84"/>
      <stop offset="100%" stop-color="var(--hero-stone)"  stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="mirrorGlass">
      <rect x="700" y="95" width="382" height="762"/>
    </clipPath>
  </defs>

  <!-- dark warm apartment interior -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- afternoon light flooding in from the left window -->
  <rect x="0" y="0" width="640" height="900" fill="url(#windowLight)"/>

  <!-- window frame grid: tall panes, subtle dark lines in the light -->
  <line x1="82"  y1="0"   x2="82"  y2="748" stroke="var(--hero-bg-3)" stroke-width="3"   stroke-opacity="0.28"/>
  <line x1="200" y1="0"   x2="200" y2="748" stroke="var(--hero-bg-3)" stroke-width="2.5" stroke-opacity="0.22"/>
  <line x1="0"   y1="250" x2="296" y2="250" stroke="var(--hero-bg-3)" stroke-width="2"   stroke-opacity="0.18"/>
  <line x1="0"   y1="466" x2="296" y2="466" stroke="var(--hero-bg-3)" stroke-width="2"   stroke-opacity="0.16"/>

  <!-- floor line: where wall meets floor, left side only -->
  <line x1="0" y1="748" x2="676" y2="748"
        stroke="var(--hero-edge)" stroke-width="1.2" stroke-opacity="0.22"/>

  <!-- terracotta pot -->
  <polygon points="462,636 542,636 568,730 436,730"
           fill="var(--hero-gold)" opacity="0.20"/>
  <line x1="454" y1="636" x2="550" y2="636"
        stroke="var(--hero-gold)" stroke-width="5" stroke-opacity="0.26" stroke-linecap="round"/>

  <!-- plant: bare branches emerging from the pot -->
  <!-- main left stem -->
  <path d="M 498,636 Q 482,534 466,434 Q 450,334 434,256 Q 418,178 406,136"
        fill="none" stroke="var(--hero-mute)" stroke-width="2.5" stroke-opacity="0.54" stroke-linecap="round"/>
  <!-- main right stem -->
  <path d="M 504,636 Q 520,540 538,444 Q 556,348 570,276 Q 584,204 594,160"
        fill="none" stroke="var(--hero-mute)" stroke-width="2"   stroke-opacity="0.46" stroke-linecap="round"/>
  <!-- secondary left -->
  <path d="M 486,566 Q 462,516 444,472 Q 426,428 414,388"
        fill="none" stroke="var(--hero-mute)" stroke-width="1.5" stroke-opacity="0.38" stroke-linecap="round"/>
  <!-- secondary right -->
  <path d="M 516,552 Q 542,504 560,460 Q 576,416 588,376"
        fill="none" stroke="var(--hero-mute)" stroke-width="1.5" stroke-opacity="0.38" stroke-linecap="round"/>
  <!-- small offshoots -->
  <line x1="450" y1="372" x2="428" y2="348" stroke="var(--hero-mute)" stroke-width="1.1" stroke-opacity="0.30" stroke-linecap="round"/>
  <line x1="468" y1="290" x2="446" y2="266" stroke="var(--hero-mute)" stroke-width="1"   stroke-opacity="0.26" stroke-linecap="round"/>
  <line x1="558" y1="364" x2="578" y2="340" stroke="var(--hero-mute)" stroke-width="1.1" stroke-opacity="0.30" stroke-linecap="round"/>
  <line x1="576" y1="282" x2="598" y2="258" stroke="var(--hero-mute)" stroke-width="1"   stroke-opacity="0.24" stroke-linecap="round"/>
  <!-- leaf clusters at branch tips -->
  <circle cx="404" cy="132" r="5"   fill="var(--hero-mute)" opacity="0.34"/>
  <circle cx="410" cy="122" r="3.5" fill="var(--hero-mute)" opacity="0.28"/>
  <circle cx="416" cy="114" r="2.5" fill="var(--hero-mute)" opacity="0.22"/>
  <circle cx="594" cy="157" r="5"   fill="var(--hero-mute)" opacity="0.34"/>
  <circle cx="600" cy="147" r="3.5" fill="var(--hero-mute)" opacity="0.26"/>
  <circle cx="426" cy="345" r="3.5" fill="var(--hero-mute)" opacity="0.26"/>
  <circle cx="578" cy="337" r="3.5" fill="var(--hero-mute)" opacity="0.26"/>
  <circle cx="444" cy="263" r="3"   fill="var(--hero-mute)" opacity="0.24"/>
  <circle cx="600" cy="255" r="3"   fill="var(--hero-mute)" opacity="0.22"/>

  <!-- MIRROR INTERIOR — clipped to the glass rectangle -->
  <g clip-path="url(#mirrorGlass)">

    <!-- reflected workspace wall — lighter than the dark room outside -->
    <rect x="700" y="95" width="382" height="762" fill="url(#reflectedWall)"/>

    <!-- reflected floor: darker zone at the bottom of the mirror -->
    <rect x="700" y="702" width="382" height="155" fill="var(--hero-bg-2)" opacity="0.28"/>
    <line x1="700" y1="702" x2="1082" y2="702"
          stroke="var(--hero-edge)" stroke-width="0.9" stroke-opacity="0.26"/>

    <!-- laptop screen glow: radiates into the reflected room -->
    <ellipse cx="856" cy="617" rx="134" ry="88" fill="url(#screenGlow)"/>

    <!-- laptop screen face -->
    <rect x="791" y="556" width="132" height="100" rx="4" fill="url(#screenFace)"/>
    <rect x="791" y="556" width="132" height="100" rx="4"
          fill="none" stroke="var(--hero-stone)" stroke-width="1.2" stroke-opacity="0.36"/>

    <!-- laptop keyboard base -->
    <rect x="783" y="656" width="148" height="9" rx="2"
          fill="var(--hero-mute)" opacity="0.35"/>

    <!-- desk tabletop -->
    <rect x="715" y="666" width="348" height="11" rx="1"
          fill="var(--hero-stone)" opacity="0.52"/>

    <!-- desk legs: trestle / sawhorse X-frames -->
    <!-- left sawhorse -->
    <line x1="743" y1="677" x2="775" y2="720" stroke="var(--hero-stone)" stroke-width="3.5" stroke-opacity="0.44" stroke-linecap="round"/>
    <line x1="775" y1="677" x2="743" y2="720" stroke="var(--hero-stone)" stroke-width="3.5" stroke-opacity="0.44" stroke-linecap="round"/>
    <!-- right sawhorse -->
    <line x1="1015" y1="677" x2="1047" y2="720" stroke="var(--hero-stone)" stroke-width="3.5" stroke-opacity="0.44" stroke-linecap="round"/>
    <line x1="1047" y1="677" x2="1015" y2="720" stroke="var(--hero-stone)" stroke-width="3.5" stroke-opacity="0.44" stroke-linecap="round"/>

    <!-- desk lamp (minimal: base, stem, arm, shade) -->
    <circle cx="1034" cy="666" r="7" fill="var(--hero-mute)" opacity="0.42"/>
    <line x1="1034" y1="659" x2="1022" y2="590"
          stroke="var(--hero-mute)" stroke-width="2.5" stroke-opacity="0.46" stroke-linecap="round"/>
    <path d="M 1022,590 Q 1008,577 990,572"
          fill="none" stroke="var(--hero-mute)" stroke-width="2.5" stroke-opacity="0.46" stroke-linecap="round"/>
    <ellipse cx="986" cy="572" rx="14" ry="8" fill="var(--hero-mute)" opacity="0.40"/>

    <!-- ORGANIC BRANCHING CRACK — the tree-pattern from the reference image -->
    <!-- primary fissure: multi-jag, runs top to bottom of mirror -->
    <path d="M 882,95 L 897,234 L 915,370 L 937,504 L 955,640 L 970,857"
          fill="none" stroke="var(--hero-mute)"   stroke-width="1.9" stroke-opacity="0.66"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 884,95 L 899,234 L 917,370 L 939,504 L 957,640 L 972,857"
          fill="none" stroke="var(--hero-bright)" stroke-width="0.8" stroke-opacity="0.38"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- major branch: breaks left from primary at ~y=364 -->
    <path d="M 914,360 L 872,450 L 840,524 L 820,590"
          fill="none" stroke="var(--hero-mute)"   stroke-width="1.5" stroke-opacity="0.56"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 915,359 L 874,450 L 842,524 L 822,590"
          fill="none" stroke="var(--hero-bright)" stroke-width="0.7" stroke-opacity="0.30"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- secondary branch: breaks right from primary at ~y=498 -->
    <path d="M 946,496 L 980,460 L 1010,438"
          fill="none" stroke="var(--hero-mute)" stroke-width="1.3" stroke-opacity="0.50"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- tertiary hairlines — the small organic splinters -->
    <line x1="899" y1="232" x2="925" y2="210"  stroke="var(--hero-mute)" stroke-width="0.8" stroke-opacity="0.40" stroke-linecap="round"/>
    <line x1="872" y1="440" x2="850" y2="426"  stroke="var(--hero-mute)" stroke-width="0.8" stroke-opacity="0.34" stroke-linecap="round"/>
    <line x1="840" y1="516" x2="817" y2="503"  stroke="var(--hero-mute)" stroke-width="0.7" stroke-opacity="0.30" stroke-linecap="round"/>
    <line x1="956" y1="634" x2="980" y2="612"  stroke="var(--hero-mute)" stroke-width="0.8" stroke-opacity="0.36" stroke-linecap="round"/>
    <line x1="937" y1="502" x2="919" y2="490"  stroke="var(--hero-mute)" stroke-width="0.7" stroke-opacity="0.28" stroke-linecap="round"/>
    <line x1="880" y1="152" x2="858" y2="138"  stroke="var(--hero-mute)" stroke-width="0.7" stroke-opacity="0.32" stroke-linecap="round"/>

  </g>

  <!-- MIRROR FRAME — drawn after clip so it cleanly overlays the glass edges -->

  <!-- left side: thick dark frame piece -->
  <rect x="676" y="95" width="24" height="762"
        fill="var(--hero-bg-3)" opacity="0.92"/>
  <line x1="700" y1="95" x2="700" y2="857"
        stroke="var(--hero-gold)" stroke-width="1.2" stroke-opacity="0.34"/>

  <!-- right side -->
  <rect x="1082" y="95" width="24" height="762"
        fill="var(--hero-bg-3)" opacity="0.92"/>
  <line x1="1082" y1="95" x2="1082" y2="857"
        stroke="var(--hero-gold)" stroke-width="1.2" stroke-opacity="0.34"/>

  <!-- bottom -->
  <rect x="676" y="857" width="430" height="24"
        fill="var(--hero-bg-3)" opacity="0.92"/>
  <line x1="676" y1="857" x2="1106" y2="857"
        stroke="var(--hero-gold)" stroke-width="1.2" stroke-opacity="0.34"/>

  <!-- BAROQUE TOP ORNAMENT: scrollwork pediment that rises above the glass -->

  <!-- center finial / cartouche -->
  <ellipse cx="891" cy="46" rx="28" ry="34"
           fill="var(--hero-bg-3)" opacity="0.94"/>
  <ellipse cx="891" cy="46" rx="28" ry="34"
           fill="none" stroke="var(--hero-gold)" stroke-width="1.8" stroke-opacity="0.46"/>
  <ellipse cx="891" cy="42" rx="14" ry="16"
           fill="var(--hero-bg-3)" opacity="0.74"/>
  <ellipse cx="891" cy="42" rx="14" ry="16"
           fill="none" stroke="var(--hero-gold)" stroke-width="1" stroke-opacity="0.36"/>

  <!-- left scroll arm: sweeps from cartouche down to top-left frame corner -->
  <path d="M 864,64 Q 836,74 808,84 Q 778,92 750,95 Q 724,96 700,95"
        fill="none" stroke="var(--hero-bg-3)" stroke-width="22" stroke-opacity="0.92" stroke-linecap="round"/>
  <path d="M 864,64 Q 836,74 808,84 Q 778,92 750,95 Q 724,96 700,95"
        fill="none" stroke="var(--hero-gold)"  stroke-width="1.5" stroke-opacity="0.42" stroke-linecap="round"/>
  <!-- left terminal ornament -->
  <ellipse cx="700" cy="95" rx="10" ry="12"
           fill="var(--hero-bg-3)" opacity="0.90"/>
  <ellipse cx="700" cy="95" rx="10" ry="12"
           fill="none" stroke="var(--hero-gold)" stroke-width="1.1" stroke-opacity="0.38"/>

  <!-- right scroll arm -->
  <path d="M 918,64 Q 946,74 974,84 Q 1004,92 1032,95 Q 1058,96 1082,95"
        fill="none" stroke="var(--hero-bg-3)" stroke-width="22" stroke-opacity="0.92" stroke-linecap="round"/>
  <path d="M 918,64 Q 946,74 974,84 Q 1004,92 1032,95 Q 1058,96 1082,95"
        fill="none" stroke="var(--hero-gold)"  stroke-width="1.5" stroke-opacity="0.42" stroke-linecap="round"/>
  <!-- right terminal ornament -->
  <ellipse cx="1082" cy="95" rx="10" ry="12"
           fill="var(--hero-bg-3)" opacity="0.90"/>
  <ellipse cx="1082" cy="95" rx="10" ry="12"
           fill="none" stroke="var(--hero-gold)" stroke-width="1.1" stroke-opacity="0.38"/>

  <!-- mirror floor shadow -->
  <ellipse cx="891" cy="884" rx="198" ry="11"
           fill="var(--hero-bg-3)" opacity="0.28"/>
</svg>
