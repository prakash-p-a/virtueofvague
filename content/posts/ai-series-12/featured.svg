<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="var(--hero-bg-1)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="300" x2="1600" y2="300" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.2"/>
  <line x1="533" y1="0" x2="533" y2="900" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.1"/>
  <line x1="1067" y1="0" x2="1067" y2="900" stroke="var(--hero-edge)" stroke-width="0.5" opacity="0.1"/>

  <!-- Left: muted box (before) -->
  <rect x="180" y="230" width="500" height="440" fill="none" stroke="var(--hero-stone)" stroke-width="1.5" opacity="0.25"/>
  <line x1="230" y1="340" x2="630" y2="340" stroke="var(--hero-mute)" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="390" x2="580" y2="390" stroke="var(--hero-mute)" stroke-width="1" opacity="0.2"/>
  <line x1="230" y1="440" x2="540" y2="440" stroke="var(--hero-mute)" stroke-width="1" opacity="0.15"/>

  <!-- Divider -->
  <line x1="800" y1="180" x2="800" y2="720" stroke="var(--hero-edge)" stroke-width="1" opacity="0.3"/>
  <circle cx="800" cy="450" r="6" fill="var(--hero-gold)" opacity="0.7"/>

  <!-- Right: gold box (after) -->
  <rect x="920" y="230" width="500" height="440" fill="none" stroke="var(--hero-gold)" stroke-width="1.5" opacity="0.4"/>
  <line x1="970" y1="340" x2="1370" y2="340" stroke="var(--hero-gold)" stroke-width="1" opacity="0.35"/>
  <line x1="970" y1="390" x2="1320" y2="390" stroke="var(--hero-gold)" stroke-width="1" opacity="0.25"/>
  <line x1="970" y1="440" x2="1280" y2="440" stroke="var(--hero-gold)" stroke-width="1" opacity="0.2"/>

  <!-- Series number -->
  <text x="1530" y="75" text-anchor="end" font-family="Georgia,serif" font-size="52" fill="var(--hero-stone)" opacity="0.25">#12</text>
</svg>
