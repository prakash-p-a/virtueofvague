<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="a wall-mounted CCTV security camera with its lens facing forward and a faint field-of-view cone">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="var(--hero-bg-1)"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)"/>
    </radialGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--hero-gold)" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="var(--hero-gold)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <line x1="0" y1="190" x2="1600" y2="190" stroke="var(--hero-edge)" stroke-opacity="0.45" stroke-width="1.2"/>
  <g fill="var(--hero-mute)" opacity="0.8">
    <rect x="1080" y="190" width="22" height="80" rx="3"/>
    <rect x="1060" y="262" width="60" height="14" rx="3"/>
  </g>
  <g fill="var(--hero-mute)" opacity="0.9">
    <rect x="700" y="276" width="380" height="130" rx="65"/>
    <rect x="870" y="240" width="6" height="38" rx="3"/>
    <circle cx="873" cy="240" r="6"/>
    <circle cx="1020" cy="320" r="5" fill="var(--hero-gold)"/>
  </g>
  <rect x="700" y="276" width="380" height="130" rx="65" fill="none" stroke="var(--hero-gold-deep)" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="700" cy="341" r="78" fill="var(--hero-bg-1)"/>
  <circle cx="700" cy="341" r="78" fill="none" stroke="var(--hero-gold)" stroke-width="3"/>
  <circle cx="700" cy="341" r="56" fill="var(--hero-bg-3)"/>
  <circle cx="700" cy="341" r="56" fill="none" stroke="var(--hero-mute)" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="700" cy="341" r="130" fill="url(#lensGlow)"/>
  <circle cx="700" cy="341" r="20" fill="var(--hero-gold)"/>
  <circle cx="694" cy="335" r="6" fill="var(--hero-bright)"/>
  <polygon points="700,341 100,140 100,540" fill="var(--hero-gold)" opacity="0.05"/>
  <g stroke="var(--hero-gold)" stroke-opacity="0.32" stroke-width="1" fill="none" stroke-dasharray="6 9">
    <line x1="700" y1="341" x2="100" y2="140"/>
    <line x1="700" y1="341" x2="100" y2="540"/>
  </g>
  <circle cx="300" cy="350" r="6" fill="var(--hero-mute)" opacity="0.6"/>
</svg>
