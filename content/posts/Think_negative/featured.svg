<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="a single candle flame standing firm against wind">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="var(--hero-bg-1)"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)"/>
    </radialGradient>
    <radialGradient id="flameGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="var(--hero-bright)" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="var(--hero-gold)" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="var(--hero-gold)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- wind streaks from left -->
  <g stroke="var(--hero-mute)" stroke-opacity="0.35" stroke-linecap="round" fill="none" stroke-width="1.6">
    <path d="M 60,280 Q 380,290 700,320"/>
    <path d="M 80,380 Q 400,395 700,420"/>
    <path d="M 60,480 Q 380,490 700,510"/>
    <path d="M 80,580 Q 400,590 700,610"/>
  </g>
  <ellipse cx="800" cy="770" rx="60" ry="7" fill="var(--hero-edge)" opacity="0.6"/>
  <rect x="778" y="540" width="44" height="230" fill="var(--hero-mute)" opacity="0.85" rx="4"/>
  <path d="M 778,560 Q 770,590 776,620" fill="none" stroke="var(--hero-mute)" stroke-opacity="0.6" stroke-width="2"/>
  <line x1="800" y1="540" x2="800" y2="505" stroke="var(--hero-edge)" stroke-width="2.5"/>
  <circle cx="803" cy="455" r="140" fill="url(#flameGlow)"/>
  <path d="M 800,510 Q 824,470 818,430 Q 814,400 800,375 Q 786,400 783,430 Q 779,470 800,510 Z"
        fill="var(--hero-gold)" opacity="0.95"/>
  <path d="M 800,498 Q 815,470 812,445 Q 805,420 800,410 Q 794,420 790,445 Q 788,470 800,498 Z"
        fill="var(--hero-bright)" opacity="0.9"/>
</svg>
