<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="a stylized human eye with a triangular prism in front of it splitting incoming light">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--hero-bg-1)"/>
      <stop offset="100%" stop-color="var(--hero-bg-3)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M 450,450 Q 800,300 1150,450 Q 800,600 450,450 Z"
        fill="none" stroke="var(--hero-mute)" stroke-width="3"/>
  <circle cx="800" cy="450" r="100" fill="var(--hero-edge)"/>
  <circle cx="800" cy="450" r="100" fill="none" stroke="var(--hero-mute)" stroke-width="1.2" stroke-opacity="0.55"/>
  <circle cx="800" cy="450" r="72" fill="none" stroke="var(--hero-mute)" stroke-width="1" stroke-opacity="0.4"/>
  <g stroke="var(--hero-stone)" stroke-width="0.8" stroke-opacity="0.55">
    <line x1="800" y1="360" x2="800" y2="540"/>
    <line x1="720" y1="380" x2="880" y2="520"/>
    <line x1="720" y1="520" x2="880" y2="380"/>
    <line x1="710" y1="450" x2="890" y2="450"/>
  </g>
  <circle cx="800" cy="450" r="36" fill="var(--hero-bg-3)"/>
  <circle cx="784" cy="436" r="7" fill="var(--hero-gold)" opacity="0.92"/>
  <g stroke="var(--hero-mute)" stroke-width="2" stroke-linecap="round">
    <line x1="620" y1="365" x2="608" y2="332"/>
    <line x1="700" y1="340" x2="696" y2="305"/>
    <line x1="800" y1="325" x2="800" y2="288"/>
    <line x1="900" y1="340" x2="906" y2="305"/>
    <line x1="980" y1="365" x2="994" y2="332"/>
  </g>
  <polygon points="1240,330 1340,540 1140,540" fill="none" stroke="var(--hero-gold)" stroke-width="2.5"/>
  <g stroke-linecap="round" fill="none">
    <line x1="1560" y1="430" x2="1290" y2="440" stroke="var(--hero-mute)" stroke-opacity="0.7" stroke-width="1.8"/>
    <line x1="1240" y1="445" x2="900" y2="410" stroke="var(--hero-gold)" stroke-opacity="0.75" stroke-width="1.6"/>
    <line x1="1240" y1="455" x2="900" y2="450" stroke="var(--hero-gold)" stroke-opacity="0.6"  stroke-width="1.3"/>
    <line x1="1240" y1="465" x2="900" y2="490" stroke="var(--hero-gold)" stroke-opacity="0.45" stroke-width="1.1"/>
  </g>
</svg>
