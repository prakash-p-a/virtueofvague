<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="a wall-mounted CCTV security camera with its lens facing forward and a faint field-of-view cone">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a1614"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </radialGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c777" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8c777" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- ceiling/wall corner suggestion -->
  <line x1="0" y1="190" x2="1600" y2="190" stroke="#3a3530" stroke-opacity="0.45" stroke-width="1.2"/>
  <!-- mount bracket -->
  <g fill="#a89880" opacity="0.8">
    <rect x="1080" y="190" width="22" height="80" rx="3"/>
    <rect x="1060" y="262" width="60" height="14" rx="3"/>
  </g>
  <!-- camera body (cylindrical, facing left toward viewer) -->
  <g fill="#a89880" opacity="0.9">
    <rect x="700" y="276" width="380" height="130" rx="65"/>
    <!-- antenna -->
    <rect x="870" y="240" width="6" height="38" rx="3"/>
    <circle cx="873" cy="240" r="6"/>
    <!-- power LED -->
    <circle cx="1020" cy="320" r="5" fill="#e8c777"/>
  </g>
  <!-- camera body outline for clarity -->
  <rect x="700" y="276" width="380" height="130" rx="65" fill="none" stroke="#b88a3a" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- lens outer ring -->
  <circle cx="700" cy="341" r="78" fill="#1a1614"/>
  <circle cx="700" cy="341" r="78" fill="none" stroke="#e8c777" stroke-width="3"/>
  <!-- lens middle ring -->
  <circle cx="700" cy="341" r="56" fill="#0a0807"/>
  <circle cx="700" cy="341" r="56" fill="none" stroke="#a89880" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- lens glow -->
  <circle cx="700" cy="341" r="130" fill="url(#lensGlow)"/>
  <!-- lens core (warm dot) -->
  <circle cx="700" cy="341" r="20" fill="#e8c777"/>
  <circle cx="694" cy="335" r="6" fill="#fff8e1"/>
  <!-- field of view cone (faint) -->
  <polygon points="700,341 100,140 100,540" fill="#e8c777" opacity="0.05"/>
  <g stroke="#e8c777" stroke-opacity="0.32" stroke-width="1" fill="none" stroke-dasharray="6 9">
    <line x1="700" y1="341" x2="100" y2="140"/>
    <line x1="700" y1="341" x2="100" y2="540"/>
  </g>
  <!-- subtle observed dot inside cone (something being watched) -->
  <circle cx="300" cy="350" r="6" fill="#a89880" opacity="0.6"/>
</svg>
