<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="a clipboard with paper, one corner torn away and four small bytes of code falling out">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1614"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5d4a"/>
      <stop offset="100%" stop-color="#4a3f31"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7b89a"/>
      <stop offset="100%" stop-color="#a89880"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- desk surface line -->
  <line x1="0" y1="800" x2="1600" y2="800" stroke="#3a3530" stroke-opacity="0.5" stroke-width="1.2"/>
  <!-- clipboard wooden back -->
  <g transform="translate(600 140)">
    <rect x="0" y="50" width="400" height="600" rx="14" fill="url(#board)"/>
    <!-- clipboard outline -->
    <rect x="0" y="50" width="400" height="600" rx="14" fill="none" stroke="#3a3530" stroke-width="1.5"/>
    <!-- top metal clip -->
    <rect x="140" y="0" width="120" height="70" rx="10" fill="#5a4f43"/>
    <rect x="160" y="20" width="80" height="30" rx="5" fill="#3a3530"/>
    <rect x="180" y="30" width="40" height="10" rx="3" fill="#a89880"/>
    <!-- paper -->
    <rect x="30" y="100" width="340" height="520" rx="4" fill="url(#paper)"/>
    <!-- paper ruled lines -->
    <g stroke="#5a4f43" stroke-opacity="0.4" stroke-width="1">
      <line x1="60" y1="160" x2="340" y2="160"/>
      <line x1="60" y1="200" x2="340" y2="200"/>
      <line x1="60" y1="240" x2="320" y2="240"/>
      <line x1="60" y1="280" x2="340" y2="280"/>
      <line x1="60" y1="320" x2="300" y2="320"/>
      <line x1="60" y1="360" x2="340" y2="360"/>
      <line x1="60" y1="400" x2="310" y2="400"/>
      <line x1="60" y1="440" x2="340" y2="440"/>
      <line x1="60" y1="480" x2="280" y2="480"/>
    </g>
    <!-- torn bottom-right corner of paper (cut diagonal) -->
    <polygon points="370,540 370,620 290,620" fill="#1a1614"/>
    <polygon points="370,540 290,620" stroke="#a89880" stroke-width="1" fill="none"/>
    <!-- jagged edge of the tear -->
    <polyline points="370,540 360,548 358,558 350,565 348,580 340,588 335,600 325,605 318,612 305,615 295,620"
              fill="none" stroke="#8a7b66" stroke-width="1.2"/>
  </g>
  <!-- the 4 bytes falling out of the tear -->
  <g fill="#e8c777" font-family="monospace" font-size="22" font-weight="bold">
    <text x="980" y="710" opacity="0.95">01</text>
    <text x="1020" y="740" opacity="0.88">10</text>
    <text x="1055" y="770" opacity="0.78">11</text>
    <text x="1085" y="795" opacity="0.65">01</text>
  </g>
  <!-- faint trailing trajectory lines -->
  <g stroke="#e8c777" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 5" fill="none">
    <line x1="965" y1="680" x2="985" y2="700"/>
    <line x1="1005" y1="710" x2="1025" y2="730"/>
    <line x1="1040" y1="740" x2="1060" y2="760"/>
  </g>
  <!-- soft glow around tear -->
  <radialGradient id="tearGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8c777" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#e8c777" stop-opacity="0"/>
  </radialGradient>
  <circle cx="980" cy="710" r="140" fill="url(#tearGlow)"/>
</svg>
