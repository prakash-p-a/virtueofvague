<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="a calendar page with a meeting entry highlighted gold, the corner peeling back to reveal binary code beneath, and a small fishhook below">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1614"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a89880"/>
      <stop offset="100%" stop-color="#8a7b66"/>
    </linearGradient>
    <radialGradient id="hookGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c777" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e8c777" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- desk surface hint -->
  <line x1="0" y1="780" x2="1600" y2="780" stroke="#3a3530" stroke-opacity="0.5" stroke-width="1.2"/>
  <!-- calendar page main rectangle -->
  <g transform="translate(540 180)">
    <rect x="0" y="0" width="520" height="540" rx="10" fill="url(#paper)" opacity="0.92"/>
    <!-- header band -->
    <rect x="0" y="0" width="520" height="64" rx="10" fill="#5a4f43" opacity="0.85"/>
    <rect x="0" y="50" width="520" height="14" fill="#5a4f43" opacity="0.85"/>
    <!-- month label dots (no readable text — three small abstract glyphs) -->
    <g fill="#a89880" opacity="0.9">
      <rect x="40" y="28" width="50" height="10" rx="2"/>
      <rect x="100" y="28" width="30" height="10" rx="2"/>
    </g>
    <!-- day-of-week markers -->
    <g fill="#5a4f43" opacity="0.85">
      <rect x="40" y="80" width="60" height="8" rx="2"/>
      <rect x="110" y="80" width="60" height="8" rx="2"/>
      <rect x="180" y="80" width="60" height="8" rx="2"/>
      <rect x="250" y="80" width="60" height="8" rx="2"/>
      <rect x="320" y="80" width="60" height="8" rx="2"/>
      <rect x="390" y="80" width="60" height="8" rx="2"/>
      <rect x="460" y="80" width="40" height="8" rx="2"/>
    </g>
    <!-- date grid (7 cols x 4 rows, just outlines) -->
    <g fill="none" stroke="#5a4f43" stroke-opacity="0.55" stroke-width="1">
      <rect x="40"  y="110" width="70" height="90" rx="3"/>
      <rect x="110" y="110" width="70" height="90" rx="3"/>
      <rect x="180" y="110" width="70" height="90" rx="3"/>
      <rect x="250" y="110" width="70" height="90" rx="3"/>
      <rect x="320" y="110" width="70" height="90" rx="3"/>
      <rect x="390" y="110" width="70" height="90" rx="3"/>
      <rect x="460" y="110" width="40" height="90" rx="3"/>
      <rect x="40"  y="210" width="70" height="90" rx="3"/>
      <rect x="110" y="210" width="70" height="90" rx="3"/>
      <rect x="180" y="210" width="70" height="90" rx="3"/>
    </g>
    <!-- THE meeting (highlighted gold) -->
    <rect x="250" y="210" width="70" height="90" rx="4" fill="#e8c777" opacity="0.92"/>
    <rect x="258" y="218" width="54" height="8" rx="2" fill="#1a1614" opacity="0.55"/>
    <rect x="258" y="232" width="40" height="6" rx="2" fill="#1a1614" opacity="0.4"/>
    <rect x="258" y="244" width="48" height="6" rx="2" fill="#1a1614" opacity="0.4"/>
    <!-- additional empty grid rows -->
    <g fill="none" stroke="#5a4f43" stroke-opacity="0.55" stroke-width="1">
      <rect x="320" y="210" width="70" height="90" rx="3"/>
      <rect x="390" y="210" width="70" height="90" rx="3"/>
      <rect x="460" y="210" width="40" height="90" rx="3"/>
      <rect x="40"  y="310" width="70" height="90" rx="3"/>
      <rect x="110" y="310" width="70" height="90" rx="3"/>
      <rect x="180" y="310" width="70" height="90" rx="3"/>
      <rect x="250" y="310" width="70" height="90" rx="3"/>
      <rect x="320" y="310" width="70" height="90" rx="3"/>
      <rect x="390" y="310" width="70" height="90" rx="3"/>
      <rect x="460" y="310" width="40" height="90" rx="3"/>
      <rect x="40"  y="410" width="70" height="90" rx="3"/>
      <rect x="110" y="410" width="70" height="90" rx="3"/>
      <rect x="180" y="410" width="70" height="90" rx="3"/>
      <rect x="250" y="410" width="70" height="90" rx="3"/>
      <rect x="320" y="410" width="70" height="90" rx="3"/>
      <rect x="390" y="410" width="70" height="90" rx="3"/>
      <rect x="460" y="410" width="40" height="90" rx="3"/>
    </g>
  </g>
  <!-- torn upper-right corner peeling back, revealing dark code underneath -->
  <polygon points="1010,180 1060,180 1060,250" fill="#0a0807"/>
  <polygon points="1010,180 1060,250 1060,180" fill="none" stroke="#3a3530" stroke-width="1"/>
  <!-- peeled corner flap (the actual ripped piece) -->
  <polygon points="1060,180 1060,250 1100,205 1095,178" fill="#5a4f43" opacity="0.7"/>
  <!-- binary code under the tear -->
  <g fill="#e8c777" opacity="0.85" font-family="monospace" font-size="9">
    <text x="1015" y="200">01</text>
    <text x="1015" y="215">10</text>
    <text x="1020" y="230">11</text>
    <text x="1025" y="245">01</text>
  </g>
  <!-- fishhook below calendar (the trap) -->
  <g transform="translate(810 760)">
    <path d="M 0,0 Q 0,-50 40,-50 Q 80,-50 80,-10 Q 80,30 40,30 Q 20,30 14,20 L 22,12 Q 22,18 30,18"
          fill="none" stroke="#e8c777" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
    <!-- line going up from hook into calendar -->
    <line x1="40" y1="-50" x2="40" y2="-110" stroke="#e8c777" stroke-opacity="0.55" stroke-width="1.2" stroke-dasharray="4 4"/>
  </g>
  <!-- hook glow -->
  <circle cx="850" cy="780" r="120" fill="url(#hookGlow)"/>
</svg>
